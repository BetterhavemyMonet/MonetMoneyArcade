<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Feelin' Froggy — Crypto Frogger Game | Monet Money Arcade</title>
<meta name="description" content="Play Feelin' Froggy — a crypto Frogger game on Solana. Cross traffic and rivers, reach the top, earn MONET token prizes. $0.99 entry, head-to-head mode available.">
<meta name="keywords" content="Frogger crypto game, Solana Frogger, MONET arcade, Web3 Frogger, blockchain arcade, earn crypto Frogger, cross traffic game crypto">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://betterhavemymonet.com/frogger.html">
<meta property="og:title" content="Feelin' Froggy — Crypto Frogger on Solana">
<meta property="og:description" content="Cross traffic and rivers. Win MONET crypto prizes. Head-to-head challenges available.">
<meta property="og:image" content="https://betterhavemymonet.com/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
.game-title {
  background: linear-gradient(90deg, #00f0ff, #a855ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.canvas-wrap canvas { border: 2px solid #00f0ff; box-shadow: 0 0 20px #00f0ff44; }
</style>
<script src="https://unpkg.com/@solana/web3.js@1.98.0/lib/index.iife.min.js"></script>
<script src="/wallet.js"></script>
<script src="/lobby.js"></script>
<script src="/gamepad.js"></script>
</head>
<body class="game-page">
<div class="game-wrap">
  <div class="game-header">
    <span class="game-title">FEELIN' FROGGY</span>
    <span class="game-hud">Score: <span id="score">0</span> &nbsp;|&nbsp; Lives: <span id="lives">3</span> &nbsp;|&nbsp; Lv: <span id="level">1</span></span>
  </div>
  <div class="game-msg" id="msg">Press START or SPACE</div>
  <div class="canvas-wrap">
    <canvas id="c"></canvas>
  </div>
</div>

<div class="ctrl-area">
  <div class="ctrl-body">
    <div class="ctrl-dpad">
      <div class="ctrl-dpad-center"></div>
      <button class="dpad-up"    ontouchstart="ctrlMove(0,-1,event)" onmousedown="ctrlMove(0,-1)">&#9650;</button>
      <button class="dpad-down"  ontouchstart="ctrlMove(0,1,event)"  onmousedown="ctrlMove(0,1)">&#9660;</button>
      <button class="dpad-left"  ontouchstart="ctrlMove(-1,0,event)" onmousedown="ctrlMove(-1,0)">&#9664;</button>
      <button class="dpad-right" ontouchstart="ctrlMove(1,0,event)"  onmousedown="ctrlMove(1,0)">&#9654;</button>
    </div>
    <div class="ctrl-mid">
      <button class="ctrl-start" ontouchstart="ctrlStart(event)" onmousedown="ctrlStart()">START</button>
      <a class="ctrl-home" href="arcade.html">&#8962;</a>
    </div>
    <div class="ctrl-ab">
      <button class="ctrl-btn-a" ontouchstart="ctrlStart(event)" onmousedown="ctrlStart()">A</button>
      <button class="ctrl-btn-b" style="opacity:0.4;pointer-events:none">B</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const COLS = 14, ROWS = 14, CELL = 30;
const W = COLS * CELL, H = ROWS * CELL;
canvas.width = W; canvas.height = H;

const img = new Image(); img.src = '/dino-sprite.png';

const SAFE_ROWS = [0, 7, 13];
const CAR_ROWS  = [8,9,10,11,12];
const LOG_ROWS  = [1,2,3,4,5];

let frog = null, cars = [], logs = [], score, lives, level, gameRunning, gameOver, animId;

function makeCars(lvl) {
  let c = [];
  const FROG_START_X = Math.floor(COLS / 2) * CELL;
  CAR_ROWS.forEach((row, i) => {
    const dir = i % 2 === 0 ? 1 : -1;
    const spd = (0.28 + i * 0.10 + lvl * 0.06) * dir;
    const count = Math.min(2, 1 + Math.floor(i / 2));
    const rowOffset = CELL * (3 + i * 2);
    for (let j = 0; j < count; j++) {
      let x = (j * Math.floor(W / count) + rowOffset) % W;
      while (x > FROG_START_X - CELL * 2 && x < FROG_START_X + CELL * 2.5) {
        x = (x + CELL * 3) % W;
      }
      c.push({ x, y: row * CELL, w: CELL * 1.6, h: CELL * 0.7, spd, row });
    }
  });
  return c;
}

function makeLogs(lvl) {
  let l = [];
  LOG_ROWS.forEach((row, i) => {
    const dir = i % 2 === 0 ? 1 : -1;
    const spd = (0.28 + i * 0.10 + lvl * 0.06) * dir;
    for (let j = 0; j < 3; j++) {
      l.push({ x: j * (W / 3), y: row * CELL, w: CELL * 2.8, h: CELL * 0.8, spd, row });
    }
  });
  return l;
}

function resetFrog() {
  frog = { x: Math.floor(COLS / 2) * CELL, y: (ROWS - 1) * CELL, onLog: false, dead: false };
}

function startGame() {
  score = 0; lives = 3; level = 1; gameOver = false; gameRunning = true;
  cars = makeCars(1); logs = makeLogs(1);
  resetFrog();
  document.getElementById('msg').textContent = '';
  document.getElementById('score').textContent = 0;
  document.getElementById('lives').textContent = 3;
  document.getElementById('level').textContent = 1;
  if (animId) cancelAnimationFrame(animId);
  loop();
}

function drawGround() {
  for (let r = 0; r < ROWS; r++) {
    let color;
    if (r === 0)          color = '#004400';
    else if (r === 7 || r === 13) color = '#2a2a2a';
    else if (LOG_ROWS.includes(r)) color = '#001a33';
    else                  color = '#1a1a1a';
    ctx.fillStyle = color;
    ctx.fillRect(0, r * CELL, W, CELL);
  }
  ctx.strokeStyle = '#333'; ctx.lineWidth = 0.5;
  for (let r = 1; r < ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r*CELL); ctx.lineTo(W, r*CELL); ctx.stroke();
  }
}

function drawCars() {
  cars.forEach(c => {
    ctx.fillStyle = '#ff4444';
    ctx.beginPath(); ctx.roundRect(c.x, c.y + CELL*0.15, c.w, c.h, 4); ctx.fill();
    ctx.fillStyle = '#ffff00';
    const hx = c.spd > 0 ? c.x + c.w - 6 : c.x + 2;
    ctx.fillRect(hx, c.y + CELL*0.2, 4, c.h * 0.4);
  });
}

function drawLogs() {
  logs.forEach(l => {
    ctx.fillStyle = '#6b3c11';
    ctx.beginPath(); ctx.roundRect(l.x, l.y + CELL*0.1, l.w, l.h, 6); ctx.fill();
    ctx.fillStyle = '#8b5e2a';
    ctx.fillRect(l.x+4, l.y+CELL*0.25, l.w-8, l.h*0.35);
  });
}

function drawFrog() {
  if (!frog || frog.dead) return;
  if (img.complete && img.naturalWidth > 0) {
    ctx.drawImage(img, frog.x, frog.y, CELL, CELL);
  } else {
    ctx.fillStyle = '#00ff9d';
    ctx.fillRect(frog.x+2, frog.y+2, CELL-4, CELL-4);
  }
}

function drawGoal() {
  ctx.fillStyle = '#00ff9d'; ctx.font = '10px Orbitron'; ctx.textAlign = 'center';
  ctx.fillText('GOAL', W/2, CELL*0.7);
  for (let i = 0; i < 3; i++) {
    ctx.strokeStyle = '#00ff9d';
    ctx.strokeRect(i * CELL*4 + CELL, CELL*0.05, CELL*2, CELL*0.85);
  }
  ctx.textAlign = 'left';
}

function update() {
  cars.forEach(c => {
    c.x += c.spd;
    if (c.x > W) c.x = -c.w;
    if (c.x < -c.w) c.x = W;
  });
  logs.forEach(l => {
    l.x += l.spd;
    if (l.x > W) l.x = -l.w;
    if (l.x < -l.w) l.x = W;
  });

  if (!frog || frog.dead) return;

  const fr = Math.round(frog.y / CELL);

  if (LOG_ROWS.includes(fr)) {
    let onLog = false;
    logs.forEach(l => {
      if (l.row === fr && frog.x + CELL*0.5 > l.x && frog.x + CELL*0.5 < l.x + l.w) {
        frog.x += l.spd; onLog = true;
      }
    });
    if (!onLog) { die(); return; }
    if (frog.x < 0 || frog.x > W - CELL) { die(); return; }
  }

  if (CAR_ROWS.includes(fr)) {
    cars.forEach(c => {
      if (c.row === fr &&
          frog.x + 4 < c.x + c.w && frog.x + CELL - 4 > c.x &&
          frog.y + 4 < c.y + c.h + CELL*0.15 && frog.y + CELL - 4 > c.y + CELL*0.15) {
        die();
      }
    });
  }

  if (fr === 0) {
    score += 50 * level; level++;
    cars = makeCars(level); logs = makeLogs(level);
    resetFrog();
    document.getElementById('score').textContent = score;
    document.getElementById('level').textContent = level;
  }
}

function die() {
  if (!frog || frog.dead) return;
  frog.dead = true; lives--;
  document.getElementById('lives').textContent = lives;
  if (lives <= 0) {
    gameOver = true; gameRunning = false;
    document.getElementById('msg').textContent = 'GAME OVER — Score: ' + score;
    saveScore(score);
    arcadeSubmitScore('frogger', score);
    return;
  }
  setTimeout(() => { resetFrog(); }, 800);
}

function loop() {
  ctx.clearRect(0, 0, W, H);
  drawGround(); drawGoal(); drawLogs(); drawCars(); drawFrog();
  if (gameRunning) update();
  document.getElementById('score').textContent = score || 0;
  animId = requestAnimationFrame(loop);
}

function move(dx, dy) {
  if (!gameRunning || !frog || frog.dead) return;
  frog.x = Math.max(0, Math.min(W - CELL, frog.x + dx * CELL));
  frog.y = Math.max(0, Math.min((ROWS-1) * CELL, frog.y + dy * CELL));
}

function ctrlMove(dx, dy, e) { if (e) e.preventDefault(); move(dx, dy); }
function ctrlStart(e) { if (e) e.preventDefault(); startGame(); }

document.addEventListener('keydown', e => {
  if (window.isLobbyOpen && window.isLobbyOpen()) return;
  if (!gameRunning && (e.code==='Space'||e.code==='Enter')) { startGame(); return; }
  if (e.code==='ArrowUp'   ||e.key==='w') move(0,-1);
  if (e.code==='ArrowDown' ||e.key==='s') move(0,1);
  if (e.code==='ArrowLeft' ||e.key==='a') move(-1,0);
  if (e.code==='ArrowRight'||e.key==='d') move(1,0);
  e.preventDefault();
});

let touchStartX, touchStartY;
canvas.addEventListener('touchstart', e => {
  if (!gameRunning) { startGame(); return; }
  touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; e.preventDefault();
}, {passive:false});
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) move(dx>0?1:-1, 0);
  else move(0, dy>0?1:-1);
  e.preventDefault();
}, {passive:false});

function saveScore(s) {
  let lb = JSON.parse(localStorage.getItem('leaderboard')||'[]');
  lb.push({ name:localStorage.getItem('player_name')||'Player', game:'Frogger', score:s, date:new Date().toLocaleDateString() });
  lb.sort((a,b)=>b.score-a.score);
  localStorage.setItem('leaderboard', JSON.stringify(lb.slice(0,20)));
}

// Initial static screen
ctx.fillStyle = '#02040a'; ctx.fillRect(0, 0, W, H);
ctx.fillStyle = '#00f0ff'; ctx.font = '14px Orbitron'; ctx.textAlign = 'center';
ctx.fillText('Press START to play', W/2, H/2);

// ─── Gamepad support ──────────────────────────────────────────────────────────
GamepadMgr.on('up',    () => move(0, -1));
GamepadMgr.on('down',  () => move(0, 1));
GamepadMgr.on('left',  () => move(-1, 0));
GamepadMgr.on('right', () => move(1, 0));
GamepadMgr.on('a',     () => { if (!gameRunning) startGame(); });
GamepadMgr.on('start', () => startGame());

// ─── Game Lobby ───────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const isCpu = new URLSearchParams(location.search).get('cpu');
  if (!isCpu) {
    showGameLobby('frogger', () => startGame());
  }
});
</script>
</body>
</html>

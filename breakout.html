<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BRICK BLASTER — MONET Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<script src="https://unpkg.com/@solana/web3.js@1.98.0/lib/index.iife.min.js"></script>
<script src="/wallet.js"></script>
<script src="/lobby.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body.game-page{background:#000;overflow:hidden;touch-action:none}
body.game-page::before{display:none}
.gw{display:flex;flex-direction:column;height:100vh}
#wbar{text-align:center;padding:3px 10px;background:#000;border-bottom:1px solid #001a33;font-size:11px;flex-shrink:0}
.arena{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;background:#000;position:relative}
#gc{display:block;image-rendering:crisp-edges}
.ctrl{flex-shrink:0;background:rgba(0,0,5,.95);border-top:1px solid #001a33;padding:6px 10px}
.cr{display:flex;justify-content:space-between;align-items:center;gap:6px}
.cb{height:54px;border-radius:10px;border:none;font-family:'Orbitron',sans-serif;font-weight:900;cursor:pointer;
    -webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
.cb:active{transform:translateY(3px)!important;box-shadow:0 1px 0!important}
.mv{flex:1;font-size:22px;background:linear-gradient(135deg,#001a33,#000d22);color:#00d4ff;border:1px solid #003366;box-shadow:0 5px 0 #000}
.launch{flex:1;font-size:11px;background:linear-gradient(135deg,#003300,#001a00);color:#00ff9d;border:1px solid #006622;box-shadow:0 5px 0 #000}
.home{font-size:18px;color:#333;text-decoration:none;padding:0 6px;align-self:center}
</style>
</head>
<body class="game-page">
<div class="wallet-bar" id="wbar"></div>
<div class="gw">
  <div class="arena"><canvas id="gc"></canvas></div>
  <div class="ctrl">
    <div class="cr">
      <button class="cb mv" ontouchstart="keys.left=true;e&&e.preventDefault()" ontouchend="keys.left=false" onmousedown="keys.left=true" onmouseup="keys.left=false" onmouseleave="keys.left=false">◀</button>
      <button class="cb launch" ontouchstart="launch(event)" onmousedown="launch()">⚡ LAUNCH / LASER</button>
      <a class="home" href="arcade.html">⌂</a>
      <button class="cb mv" ontouchstart="keys.right=true;e&&e.preventDefault()" ontouchend="keys.right=false" onmousedown="keys.right=true" onmouseup="keys.right=false" onmouseleave="keys.right=false">▶</button>
    </div>
  </div>
</div>
<script>
const C=document.getElementById('gc'),X=C.getContext('2d');
let W,H;
function resize(){
  const p=C.parentElement;
  W=p.clientWidth;H=p.clientHeight;
  // Clamp to a reasonable aspect ratio
  if(W/H>0.7){W=H*0.7|0;}
  C.width=W;C.height=H;
}
window.addEventListener('resize',()=>{resize();});

// Brick grid: 10 cols × 8 rows
const BCOLS=10,BROWS=8;
// Row definitions: [color, hp, points]
const ROW_DEF=[
  ['#ffd700',3,500],['#ffd700',3,500],
  ['#ff6600',2,300],['#ff6600',2,300],
  ['#ff2244',2,200],['#ff2244',2,200],
  ['#4488ff',1,100],['#00ccff',1, 50],
];

let bricks,ball,balls,paddle,lives,score,level,phase,powerups;
let laserShots,laserMode,wideTimer,slowTimer,laserTimer;
let particles,floatTexts;
let rafId,lastT=0,sessionActive=false;
const keys={left:false,right:false};

const BALL_R=7;
const PAD_H=12;
function PAD_W(){return Math.min(W*.22,90)*(wideTimer>0?1.7:1);}
function BALL_SPD(){return (W*.012)*(slowTimer>0?.55:1)*(1+level*.07);}
function BRICK_W(){return (W-20)/BCOLS;}
function BRICK_H(){return Math.min(22,H*.038);}
const BRICK_GAP=2;
const TOP_OFF=50;

function initLevel(){
  const bw=BRICK_W(),bh=BRICK_H();
  bricks=[];
  for(let r=0;r<BROWS;r++){
    const [col,hp,pts]=ROW_DEF[r];
    for(let c=0;c<BCOLS;c++){
      bricks.push({
        x:10+c*(bw+BRICK_GAP),y:TOP_OFF+r*(bh+BRICK_GAP),
        w:bw,h:bh,col,hp,maxHp:hp,pts,
        crack:0
      });
    }
  }
  balls=[{x:W/2,y:H*.65,vx:BALL_SPD()*(Math.random()>.5?1:-1),vy:-BALL_SPD(),stuck:false}];
  paddle={x:W/2-PAD_W()/2,y:H*.82};
  laserShots=[];laserMode=false;
  wideTimer=0;slowTimer=0;laserTimer=0;
  powerups=[];particles=[];floatTexts=[];
}

function initGame(){
  lives=3;score=0;level=1;phase='play';
  initLevel();
}

function spawnPowerup(x,y){
  if(Math.random()>.18)return;
  const types=['W','S','M','L','+'];
  const cols={'W':'#00d4ff','S':'#c084fc','M':'#ff8800','L':'#ff4444','+':'#00ff9d'};
  const t=types[Math.random()*types.length|0];
  powerups.push({x,y,t,col:cols[t],vy:2.2,r:10});
}

function spawnParticles(x,y,col,n=10){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,col,life:24+Math.random()*16,ml:40,sz:2+Math.random()*3});
  }
}

function floatText(x,y,txt,col){
  floatTexts.push({x,y,txt,col,life:32,ml:32,vy:-1.2});
}

function launch(e){
  if(e)e.preventDefault();
  if(phase!=='play')return;
  if(laserMode&&laserTimer>0){
    // Fire laser from paddle
    laserShots.push({x:paddle.x+PAD_W()*.3,y:paddle.y,vy:-12});
    laserShots.push({x:paddle.x+PAD_W()*.7,y:paddle.y,vy:-12});
    return;
  }
  // Unstick any stuck balls
  balls.forEach(b=>{if(b.stuck){b.stuck=false;}});
}

function movePaddle(dt){
  const spd=W*.48/1000*dt;
  const pw=PAD_W();
  if(keys.left)paddle.x=Math.max(0,paddle.x-spd);
  if(keys.right)paddle.x=Math.min(W-pw,paddle.x+spd);
}

// Touch drag for paddle
let touchPadX=null;
C.addEventListener('touchstart',e=>{e.preventDefault();touchPadX=e.touches[0].clientX;},{passive:false});
C.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(touchPadX===null)return;
  const dx=e.touches[0].clientX-touchPadX;
  const pw=PAD_W();
  paddle.x=Math.max(0,Math.min(W-pw,paddle.x+dx*.8));
  touchPadX=e.touches[0].clientX;
},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();touchPadX=null;},{passive:false});
document.addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft')keys.left=true;
  if(e.code==='ArrowRight')keys.right=true;
  if(e.code==='Space'||e.code==='Enter'){e.preventDefault();launch();}
});
document.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft')keys.left=false;
  if(e.code==='ArrowRight')keys.right=false;
});

function ballUpdate(b,dt){
  if(b.stuck){b.x=paddle.x+PAD_W()/2;b.y=paddle.y-BALL_R-2;return;}
  b.x+=b.vx*dt/16;b.y+=b.vy*dt/16;
  // Wall bounces
  if(b.x-BALL_R<0){b.x=BALL_R;b.vx=Math.abs(b.vx);}
  if(b.x+BALL_R>W){b.x=W-BALL_R;b.vx=-Math.abs(b.vx);}
  if(b.y-BALL_R<0){b.y=BALL_R;b.vy=Math.abs(b.vy);}
  // Paddle hit
  const pw=PAD_W();
  if(b.y+BALL_R>=paddle.y&&b.y+BALL_R<=paddle.y+PAD_H+4&&b.x>=paddle.x-4&&b.x<=paddle.x+pw+4&&b.vy>0){
    const hit=(b.x-(paddle.x+pw/2))/(pw/2);
    const angle=hit*Math.PI*.38+Math.PI/2*1.05;
    const sp=BALL_SPD();
    b.vx=-Math.cos(angle)*sp;b.vy=-Math.abs(Math.sin(angle)*sp);
    b.y=paddle.y-BALL_R-1;
  }
  // Brick hits
  for(let i=bricks.length-1;i>=0;i--){
    const br=bricks[i];
    if(b.x+BALL_R>br.x&&b.x-BALL_R<br.x+br.w&&b.y+BALL_R>br.y&&b.y-BALL_R<br.y+br.h){
      // Determine bounce direction
      const overlapL=b.x+BALL_R-br.x,overlapR=br.x+br.w-b.x+BALL_R;
      const overlapT=b.y+BALL_R-br.y,overlapB=br.y+br.h-b.y+BALL_R;
      const minH=Math.min(overlapL,overlapR),minV=Math.min(overlapT,overlapB);
      if(minH<minV)b.vx*=-1;else b.vy*=-1;
      br.hp--;br.crack=1-br.hp/br.maxHp;
      spawnParticles(b.x,b.y,br.col,7);
      if(br.hp<=0){
        score+=br.pts*level;floatText(br.x+br.w/2,br.y,'+'+br.pts*level,br.col);
        spawnPowerup(br.x+br.w/2,br.y+br.h/2);
        bricks.splice(i,1);
        spawnParticles(br.x+br.w/2,br.y+br.h/2,br.col,14);
      }
      break;
    }
  }
  // Lost
  if(b.y-BALL_R>H){b.lost=true;}
}

function update(dt){
  if(phase!=='play')return;
  if(wideTimer>0)wideTimer-=dt;
  if(slowTimer>0)slowTimer-=dt;
  if(laserTimer>0)laserTimer-=dt;else laserMode=false;
  movePaddle(dt);
  balls.forEach(b=>ballUpdate(b,dt));
  const lost=balls.filter(b=>b.lost);
  balls=balls.filter(b=>!b.lost);
  if(balls.length===0){
    lives--;
    if(lives<=0){endGame();return;}
    const nb={x:W/2,y:H*.65,vx:BALL_SPD()*(Math.random()>.5?1:-1),vy:-BALL_SPD(),stuck:true};
    balls=[nb];
  }
  // Laser shots
  laserShots.forEach(ls=>{ls.y+=ls.vy*dt/16;});
  for(let li=laserShots.length-1;li>=0;li--){
    const ls=laserShots[li];
    if(ls.y<-10){laserShots.splice(li,1);continue;}
    for(let bi=bricks.length-1;bi>=0;bi--){
      const br=bricks[bi];
      if(ls.x>br.x&&ls.x<br.x+br.w&&ls.y>br.y&&ls.y<br.y+br.h){
        br.hp--;br.crack=1-br.hp/br.maxHp;
        spawnParticles(ls.x,br.y,br.col,5);
        if(br.hp<=0){
          score+=br.pts*level;floatText(br.x+br.w/2,br.y,'+'+br.pts*level,br.col);
          spawnPowerup(br.x+br.w/2,br.y+br.h/2);
          bricks.splice(bi,1);spawnParticles(br.x+br.w/2,br.y+br.h/2,br.col,10);
        }
        laserShots.splice(li,1);break;
      }
    }
  }
  // Powerups
  powerups.forEach(p=>p.y+=p.vy*dt/16);
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];
    if(p.y>H){powerups.splice(i,1);continue;}
    const pw=PAD_W();
    if(p.y+p.r>paddle.y&&p.y-p.r<paddle.y+PAD_H&&p.x+p.r>paddle.x&&p.x-p.r<paddle.x+pw){
      powerups.splice(i,1);
      floatText(p.x,p.y-10,p.t==='+'?'EXTRA LIFE!':p.t==='W'?'WIDE!':p.t==='S'?'SLOW!':p.t==='M'?'MULTI!':'LASER!',p.col);
      if(p.t==='W')wideTimer=10000;
      else if(p.t==='S')slowTimer=8000;
      else if(p.t==='M'){
        const sp=BALL_SPD();
        for(let k=0;k<2;k++) balls.push({x:W/2,y:H*.5,vx:sp*(Math.random()>.5?1:-1),vy:-sp,stuck:false});
      }
      else if(p.t==='L'){laserMode=true;laserTimer=8000;}
      else if(p.t==='+')lives=Math.min(lives+1,5);
    }
  }
  // Particles & floats
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life--;});
  particles=particles.filter(p=>p.life>0);
  floatTexts.forEach(f=>{f.y+=f.vy;f.life--;});
  floatTexts=floatTexts.filter(f=>f.life>0);
  // Level clear
  if(bricks.length===0){
    level++;
    setTimeout(()=>initLevel(),600);
  }
}

function draw(){
  X.clearRect(0,0,W,H);
  X.fillStyle='#000510';X.fillRect(0,0,W,H);
  // Grid dots
  X.fillStyle='#00224422';
  for(let x=0;x<W;x+=40)for(let y=0;y<H;y+=40){X.beginPath();X.arc(x,y,1,0,Math.PI*2);X.fill();}

  // HUD
  X.fillStyle='#00d4ff';X.font='bold 12px Orbitron,sans-serif';X.textAlign='left';
  X.shadowBlur=8;X.shadowColor='#00d4ff44';
  X.fillText('SCORE '+score,10,20);
  X.shadowBlur=0;X.fillStyle='#ffd700';X.textAlign='center';
  X.fillText('LV '+level,W/2,20);
  X.textAlign='right';
  for(let i=0;i<lives;i++)X.fillText('♥',W-10-i*16,20);
  // Active power-up indicators
  let px=10,py=36;
  if(wideTimer>0){X.fillStyle='#00d4ff';X.font='bold 9px Orbitron,sans-serif';X.textAlign='left';X.fillText('WIDE '+(wideTimer/1000).toFixed(0)+'s',px,py);px+=60;}
  if(slowTimer>0){X.fillStyle='#c084fc';X.fillText('SLOW '+(slowTimer/1000).toFixed(0)+'s',px,py);px+=60;}
  if(laserMode){X.fillStyle='#ff4444';X.fillText('LASER '+(laserTimer/1000).toFixed(0)+'s',px,py);}

  // Bricks
  bricks.forEach(br=>{
    const pct=br.hp/br.maxHp;
    const g=X.createLinearGradient(br.x,br.y,br.x,br.y+br.h);
    g.addColorStop(0,br.col+'dd');g.addColorStop(1,br.col+'77');
    X.fillStyle=g;X.fillRect(br.x,br.y,br.w,br.h);
    // Crack overlay
    if(br.crack>0){
      X.save();X.globalAlpha=br.crack*.7;X.fillStyle='#000';
      X.fillRect(br.x+br.w*.3,br.y,2,br.h*.6);
      X.fillRect(br.x+br.w*.6,br.y+br.h*.4,2,br.h*.6);
      X.restore();
    }
    // Highlight
    X.fillStyle='rgba(255,255,255,.15)';X.fillRect(br.x+2,br.y+2,br.w-4,3);
    X.strokeStyle=br.col+'99';X.lineWidth=1;X.strokeRect(br.x+.5,br.y+.5,br.w-1,br.h-1);
    // HP dots
    for(let i=0;i<br.maxHp;i++){
      X.fillStyle=i<br.hp?br.col:'#333';
      X.beginPath();X.arc(br.x+6+i*8,br.y+br.h-5,2.5,0,Math.PI*2);X.fill();
    }
  });

  // Paddle
  const pw=PAD_W();
  const pg=X.createLinearGradient(paddle.x,paddle.y,paddle.x+pw,paddle.y+PAD_H);
  pg.addColorStop(0,'#0066cc');pg.addColorStop(.5,'#00aaff');pg.addColorStop(1,'#0055bb');
  X.fillStyle=pg;X.beginPath();
  X.roundRect?X.roundRect(paddle.x,paddle.y,pw,PAD_H,5):X.fillRect(paddle.x,paddle.y,pw,PAD_H);
  X.fill();
  X.strokeStyle='#00d4ffaa';X.lineWidth=1.5;X.beginPath();
  X.roundRect?X.roundRect(paddle.x+.5,paddle.y+.5,pw-1,PAD_H-1,5):X.strokeRect(paddle.x+.5,paddle.y+.5,pw-1,PAD_H-1);
  X.stroke();
  if(laserMode){
    X.save();X.globalAlpha=.6+.3*Math.sin(Date.now()*.01);
    X.strokeStyle='#ff4444';X.lineWidth=2;
    X.beginPath();X.moveTo(paddle.x+pw*.3,paddle.y);X.lineTo(paddle.x+pw*.3,-H);
    X.beginPath();X.moveTo(paddle.x+pw*.7,paddle.y);X.lineTo(paddle.x+pw*.7,-H);
    X.stroke();X.restore();
  }

  // Laser shots
  X.strokeStyle='#ff4444';X.lineWidth=3;X.shadowBlur=10;X.shadowColor='#ff4444';
  laserShots.forEach(ls=>{X.beginPath();X.moveTo(ls.x,ls.y);X.lineTo(ls.x,ls.y+20);X.stroke();});
  X.shadowBlur=0;

  // Balls
  balls.forEach(b=>{
    const bg=X.createRadialGradient(b.x-BALL_R*.3,b.y-BALL_R*.3,1,b.x,b.y,BALL_R);
    bg.addColorStop(0,'#ffffff');bg.addColorStop(.4,'#00aaff');bg.addColorStop(1,'#0044cc');
    X.fillStyle=bg;
    X.shadowBlur=14;X.shadowColor='#00aaff';
    X.beginPath();X.arc(b.x,b.y,BALL_R,0,Math.PI*2);X.fill();
    X.shadowBlur=0;
  });

  // Powerups
  powerups.forEach(p=>{
    X.save();X.translate(p.x,p.y);
    X.fillStyle=p.col+'33';X.beginPath();X.arc(0,0,p.r+4,0,Math.PI*2);X.fill();
    X.fillStyle=p.col;X.beginPath();X.arc(0,0,p.r,0,Math.PI*2);X.fill();
    X.fillStyle='#000';X.font=`bold ${p.r*.9|0}px Orbitron,sans-serif`;
    X.textAlign='center';X.textBaseline='middle';X.fillText(p.t,0,1);
    X.restore();
  });

  // Particles
  particles.forEach(p=>{
    X.save();X.globalAlpha=p.life/p.ml;X.fillStyle=p.col;
    X.beginPath();X.arc(p.x,p.y,p.sz,0,Math.PI*2);X.fill();X.restore();
  });
  floatTexts.forEach(f=>{
    X.save();X.globalAlpha=f.life/f.ml;X.fillStyle=f.col;
    X.font='bold 13px Orbitron,sans-serif';X.textAlign='center';
    X.shadowBlur=8;X.shadowColor=f.col;X.fillText(f.txt,f.x,f.y);X.restore();
  });

  if(phase==='idle'){
    X.fillStyle='rgba(0,5,16,.7)';X.fillRect(0,0,W,H);
    X.fillStyle='#00d4ff';X.font='bold 22px Orbitron,sans-serif';X.textAlign='center';
    X.shadowBlur=18;X.shadowColor='#00d4ff';X.fillText('BRICK BLASTER',W/2,H/2-14);
    X.shadowBlur=0;X.fillStyle='#ffffff55';X.font='bold 10px Orbitron,sans-serif';
    X.fillText('smash bricks · catch power-ups',W/2,H/2+8);
  }
}

function endGame(){
  phase='over';
  if(sessionActive){arcadeSubmitScore('breakout',score).catch(()=>{});sessionActive=false;}
  const b=document.createElement('div');
  b.style.cssText='position:fixed;inset:0;background:rgba(0,2,12,.96);z-index:9999;display:flex;align-items:center;justify-content:center;font-family:Orbitron,sans-serif';
  b.innerHTML=`<div style="background:linear-gradient(160deg,#000a20,#00142a);border:2px solid #00d4ff;border-radius:20px;padding:28px 22px;width:min(320px,90vw);text-align:center">
    <div style="font-size:40px;margin-bottom:8px">🧱</div>
    <div style="font-size:20px;font-weight:900;color:#00d4ff;letter-spacing:3px;margin-bottom:14px">GAME OVER</div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #ffffff0d;font-size:12px"><span style="color:#666">SCORE</span><span style="color:#00d4ff;font-weight:800">${score.toLocaleString()}</span></div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;font-size:12px"><span style="color:#666">LEVEL REACHED</span><span style="color:#ffd700;font-weight:800">${level}</span></div>
    <button onclick="location.reload()" style="margin-top:16px;width:100%;padding:12px;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,#00d4ff,#0066aa);color:#000;font-family:Orbitron,sans-serif;font-size:12px;font-weight:900">PLAY AGAIN</button>
    <button onclick="location.href='arcade.html'" style="margin-top:8px;width:100%;padding:10px;border-radius:12px;border:1px solid #222;cursor:pointer;background:transparent;color:#555;font-family:Orbitron,sans-serif;font-size:10px">← ARCADE</button>
  </div>`;
  document.body.appendChild(b);
}

function loop(ts){
  rafId=requestAnimationFrame(loop);
  const dt=Math.min(100,ts-lastT);lastT=ts;
  if(phase==='play')update(dt);
  draw();
}

document.addEventListener('DOMContentLoaded',()=>{
  renderWalletBar('wbar');
  resize();
  phase='idle';initGame();
  lastT=performance.now();
  rafId=requestAnimationFrame(loop);

  showGameLobby('breakout',()=>{
    sessionActive=true;
    phase='idle';initGame();
    setTimeout(()=>{phase='play';},200);
  });
});
</script>
</body>
</html>

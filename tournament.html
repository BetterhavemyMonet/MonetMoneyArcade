<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Arcade Tournaments — Monet Money Arcade on Solana</title>
<meta name="description" content="Join MONET token tournaments on Solana. Compete against multiple players, top 3 win crypto prizes automatically. Play Mario, Pac-Man, Snake and more.">
<meta name="keywords" content="crypto tournament, Solana arcade tournament, MONET token prize, Web3 gaming tournament, blockchain game competition, play to earn tournament">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://betterhavemymonet.com/tournament.html">
<meta property="og:title" content="Arcade Tournaments — Win MONET Crypto Prizes">
<meta property="og:description" content="Multi-player arcade tournaments on Solana. Top 3 paid in MONET automatically. $0.99 entry.">
<meta property="og:image" content="https://betterhavemymonet.com/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<script src="https://unpkg.com/@solana/web3.js@1.98.0/lib/index.iife.min.js"></script>
<script src="/wallet.js"></script>
<style>
body { background:#02040a url('/title.jpg') center/cover fixed; min-height:100vh; }
body::before { content:''; position:fixed; inset:0; background:rgba(2,4,10,0.86); pointer-events:none; z-index:0; }
.page { position:relative; z-index:1; padding:12px 0 40px; }
.wallet-bar { text-align:center; padding:8px 16px; background:rgba(0,0,0,0.3); }

.nav-row { display:flex; justify-content:center; gap:10px; margin:12px 0; flex-wrap:wrap; padding:0 12px; }
.nav-btn { padding:7px 18px; border-radius:8px; border:1px solid #a855ff; background:transparent; color:#a855ff; font-family:'Orbitron',sans-serif; font-size:10px; font-weight:bold; cursor:pointer; }
.nav-btn:hover { background:#a855ff; color:#000; }

.section { max-width:520px; margin:0 auto; padding:0 14px; }
.card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:20px; margin-bottom:16px; }
.card-title { font-family:'Orbitron',sans-serif; font-size:13px; font-weight:800; color:#fff; margin-bottom:12px; }

.t-card {
  background:rgba(255,215,0,0.04); border:1px solid #ffd70022;
  border-radius:14px; padding:16px; margin-bottom:12px;
}
.t-title  { font-family:'Orbitron',sans-serif; font-size:13px; font-weight:800; color:#ffd700; }
.t-game   { font-size:10px; color:#888; margin:2px 0 8px; }
.t-prize  { font-size:18px; font-weight:800; color:#ffd700; }
.t-sub    { font-size:10px; color:#888; }
.t-status { font-size:9px; padding:2px 8px; border-radius:20px; display:inline-block; font-family:'Orbitron',sans-serif; font-weight:bold; }
.st-registration { background:rgba(0,255,157,0.1); color:#00ff9d; border:1px solid #00ff9d44; }
.st-active       { background:rgba(168,85,255,0.1); color:#a855ff; border:1px solid #a855ff44; }
.st-complete     { background:rgba(255,215,0,0.1); color:#ffd700; border:1px solid #ffd70044; }

.prize-row { display:flex; justify-content:space-between; font-size:11px; padding:5px 0; border-bottom:1px solid #ffffff08; }
.prize-rank { color:#888; }
.prize-amt  { color:#ffd700; font-weight:700; }
.players-count { font-size:12px; color:#a855ff; font-weight:bold; }
.progress { background:#1a1a2e; border-radius:20px; height:6px; margin:8px 0 4px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,#a855ff,#00f0ff); border-radius:20px; transition:width .3s; }

.btn-primary {
  padding:10px 18px; border-radius:10px; border:none; cursor:pointer;
  background:linear-gradient(135deg,#a855ff,#7c3aed); color:#fff;
  font-family:'Orbitron',sans-serif; font-size:11px; font-weight:800;
}
.btn-gold {
  padding:10px 18px; border-radius:10px; border:none; cursor:pointer;
  background:linear-gradient(135deg,#ffd700,#ff9500); color:#000;
  font-family:'Orbitron',sans-serif; font-size:11px; font-weight:800;
}
.btn-full { width:100%; padding:12px; margin-top:10px; font-size:12px; }
.err { color:#ff4488; font-size:11px; margin-top:6px; min-height:16px; }

.create-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
select, input[type=text], input[type=number] {
  flex:1; min-width:100px; padding:8px 10px; border-radius:8px; border:1px solid #333;
  background:#111827; color:#fff; font-family:'Orbitron',sans-serif; font-size:10px;
}
select:focus, input:focus { outline:none; border-color:#a855ff; }

.winner-row { display:flex; align-items:center; gap:8px; padding:6px 0; }
.winner-medal { font-size:16px; }
.winner-addr  { font-size:10px; color:#aaa; }
.winner-amt   { margin-left:auto; font-size:12px; font-weight:700; color:#ffd700; }

.countdown { font-family:'Orbitron',sans-serif; font-size:11px; color:#a855ff; }
</style>
</head>
<body>
<div class="wallet-bar" id="wbar"></div>
<div class="page">
<img src="/logo.png" style="width:60px;display:block;margin:8px auto 4px;filter:drop-shadow(0 0 12px #ffd700)">
<h1 style="background:linear-gradient(90deg,#ffd700,#ff9500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0;font-size:20px">TOURNAMENTS</h1>
<p style="color:#888;font-size:11px;margin:4px 0 12px;font-family:Orbitron,sans-serif">Pay entry · Play to score · Top 3 share the pot</p>

<div class="nav-row">
  <button class="nav-btn" onclick="location.href='arcade.html'">&#8592; Arcade</button>
  <button class="nav-btn" onclick="location.href='challenge.html'">&#9876; H2H</button>
</div>

<div class="section">

  <!-- Active Tournaments -->
  <div id="tourney-list">
    <div style="color:#555;font-size:11px;text-align:center;padding:20px">Loading tournaments…</div>
  </div>

  <!-- Create Tournament (admin-style) -->
  <div class="card">
    <div class="card-title">&#9998; CREATE TOURNAMENT</div>
    <div class="create-row">
      <select id="t-game">
        <option value="frogger">&#128056; Feelin' Froggy</option>
        <option value="snake">&#128013; Slithering Serpent</option>
        <option value="pacman">&#128049; Rawr-man</option>
        <option value="pong">&#127934; Pong</option>
        <option value="dino">&#9889; Runner</option>
        <option value="invaders">&#128125; Space Invaders</option>
        <option value="mario">&#127812; Monet Bros</option>
        <option value="fighter">&#129354; Ready. Set. Fight.</option>
      </select>
      <select id="t-size">
        <option value="4">4 players</option>
        <option value="8" selected>8 players</option>
        <option value="16">16 players</option>
      </select>
    </div>
    <input type="text" id="t-title" placeholder="Tournament name (optional)" style="width:100%;box-sizing:border-box;margin-bottom:10px">
    <button class="btn-primary btn-full" onclick="doCreateTourney()">CREATE TOURNAMENT</button>
    <div class="err" id="ct-err"></div>
  </div>

  <!-- Prize Structure -->
  <div class="card">
    <div class="card-title">&#127942; PRIZE STRUCTURE</div>
    <div class="prize-row"><span class="prize-rank">&#129351; 1st Place</span><span class="prize-amt">50% of pot</span></div>
    <div class="prize-row"><span class="prize-rank">&#129352; 2nd Place</span><span class="prize-amt">30% of pot</span></div>
    <div class="prize-row"><span class="prize-rank">&#129353; 3rd Place</span><span class="prize-amt">10% of pot</span></div>
    <div class="prize-row"><span class="prize-rank">&#127968; House</span><span style="color:#888">10% rake</span></div>
    <div style="font-size:10px;color:#555;margin-top:8px">
      Example 8-player: 40 MONET pool → 1st gets 18, 2nd gets 12, 3rd gets 4
    </div>
  </div>

</div>
</div>

<script>
async function loadTourneys() {
  const el = document.getElementById('tourney-list');
  try {
    const res = await api('/api/tournament/list');
    const list = res.tournaments;
    if (!list.length) {
      el.innerHTML = `
        <div style="text-align:center;padding:24px;color:#555;font-size:11px">
          No active tournaments. Create one below or wait for the next scheduled event!
        </div>
      `;
      return;
    }
    el.innerHTML = list.slice().reverse().map(t => renderTourneyCard(t)).join('');
    list.filter(t => t.status === 'active').forEach(t => startCountdown(t));
  } catch(e) {
    el.innerHTML = `<div style="color:#ff4488;font-size:11px;text-align:center;padding:16px">${e.message}</div>`;
  }
}

function renderTourneyCard(t) {
  const pool      = t.prizePool || 0;
  const pct       = t.players.length / t.maxPlayers;
  const isIn      = WalletState.connected && t.players.find(p => p.wallet === WalletState.address);
  const timeLeft  = t.endTime ? Math.max(0, Math.floor((t.endTime - Date.now()) / 60000)) : null;
  const gameLabel = { frogger:"Feelin' Froggy", snake:'Slithering Serpent', pacman:'Rawr-man', pong:'Pong', dino:'Runner', fighter:'Ready. Set. Fight.' }[t.game] || t.game;

  let winners = '';
  if (t.status === 'complete' && t.winners.length) {
    const medals = ['&#129351;','&#129352;','&#129353;'];
    winners = `
      <div style="margin-top:12px;border-top:1px solid #ffffff0d;padding-top:10px">
        <div style="font-size:10px;color:#888;margin-bottom:6px;font-family:Orbitron,sans-serif">RESULTS</div>
        ${t.winners.map((w,i) => `
          <div class="winner-row">
            <span class="winner-medal">${medals[i]||'#'+(i+1)}</span>
            <span class="winner-addr">${w.wallet.slice(0,6)}…${w.wallet.slice(-4)}</span>
            <span class="winner-amt">+${w.payout} MONET ${w.payoutTxId ? '✓' : '⏳'}</span>
          </div>
        `).join('')}
      </div>
    `;
  }

  return `
    <div class="t-card" id="tc-${t.id}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="t-title">${t.title}</div>
          <div class="t-game">&#127918; ${gameLabel} &nbsp;|&nbsp; ≈$0.99 entry (${t.entryFee} MONET)</div>
        </div>
        <span class="t-status st-${t.status}">${t.status.toUpperCase()}</span>
      </div>

      <div style="display:flex;gap:20px;margin:8px 0">
        <div>
          <div class="t-prize">${pool.toFixed(1)} MONET</div>
          <div class="t-sub">Prize pool</div>
        </div>
        <div>
          <div class="players-count">${t.players.length} / ${t.maxPlayers}</div>
          <div class="t-sub">players</div>
        </div>
        ${timeLeft !== null ? `
        <div>
          <div class="countdown" id="cd-${t.id}">${timeLeft}m left</div>
          <div class="t-sub">to play</div>
        </div>
        ` : ''}
      </div>

      <div class="progress"><div class="progress-fill" style="width:${Math.round(pct*100)}%"></div></div>

      ${t.status === 'registration' ? `
        ${!isIn ? `
          <button class="btn-gold btn-full" onclick="joinTourney('${t.id}','${t.game}')">PAY ≈$0.99 (${t.entryFee||5} MONET) &amp; REGISTER &#9658;</button>
        ` : `
          <div style="color:#00ff9d;font-size:11px;margin-top:8px">&#10003; Registered — waiting for tournament to start</div>
          ${t.players.length >= t.minPlayers ? `
            <button class="btn-primary btn-full" onclick="startTourney('${t.id}')">START NOW (${t.players.length} players ready)</button>
          ` : ''}
        `}
      ` : t.status === 'active' ? `
        ${isIn ? `
          <button class="btn-gold btn-full" onclick="location.href='/${t.game}.html?tournament=${t.id}'">PLAY YOUR TURN &#9658;</button>
        ` : `
          <div style="color:#888;font-size:11px;margin-top:8px">Tournament in progress — registration closed</div>
        `}
      ` : ''}

      ${winners}

      <div class="err" id="terr-${t.id}"></div>
    </div>
  `;
}

function startCountdown(t) {
  const el = document.getElementById(`cd-${t.id}`);
  if (!el) return;
  const tick = () => {
    const mins = Math.max(0, Math.floor((t.endTime - Date.now()) / 60000));
    const secs = Math.max(0, Math.floor(((t.endTime - Date.now()) % 60000) / 1000));
    el.textContent = mins > 0 ? `${mins}m ${secs}s left` : `${secs}s left`;
    if (Date.now() < t.endTime) setTimeout(tick, 1000);
    else { el.textContent = 'Ended'; loadTourneys(); }
  };
  tick();
}

async function joinTourney(tournamentId, game) {
  const err = document.getElementById(`terr-${tournamentId}`);
  if (!WalletState.connected) { err.textContent = 'Connect wallet first'; return; }
  location.href = `/${game}.html?tournament=${tournamentId}`;
}

async function startTourney(tournamentId) {
  const err = document.getElementById(`terr-${tournamentId}`);
  try {
    await api(`/api/tournament/start/${tournamentId}`, 'POST');
    loadTourneys();
  } catch(e) {
    err.textContent = e.message;
  }
}

async function doCreateTourney() {
  const game    = document.getElementById('t-game').value;
  const size    = parseInt(document.getElementById('t-size').value);
  const title   = document.getElementById('t-title').value.trim();
  const err     = document.getElementById('ct-err');
  err.textContent = '';
  try {
    await api('/api/tournament/create', 'POST', { game, maxPlayers: size, title: title || undefined });
    loadTourneys();
    document.getElementById('t-title').value = '';
  } catch(e) {
    err.textContent = e.message;
  }
}

document.addEventListener('walletConnected', loadTourneys);
document.addEventListener('DOMContentLoaded', () => {
  renderWalletBar('wbar');
  loadTourneys();
  setInterval(loadTourneys, 15000);

  // Pre-select game from ?game= URL param
  const pGame = new URLSearchParams(location.search).get('game');
  if (pGame) {
    const sel = document.getElementById('t-game');
    if (sel) {
      const opt = sel.querySelector(`option[value="${pGame}"]`);
      if (opt) sel.value = pGame;
    }
  }
});
</script>
</body>
</html>

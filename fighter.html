<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ready. Set. Fight.</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<script src="https://unpkg.com/@solana/web3.js@1.98.0/lib/index.iife.min.js"></script>
<script src="/wallet.js"></script>
<script src="/gamepad.js"></script>
<style>
body.game-page { background: #020006 url('/title.jpg') center/cover fixed; }
body.game-page::before { background: rgba(2,0,8,0.88); }

/* ── HUD ── */
#hud {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 8px; flex-shrink: 0; gap: 8px; width: 100%; max-width: 520px;
  margin: 0 auto;
}
.hp-block { flex: 1; }
.hp-name {
  font-size: 9px; font-weight: 800; letter-spacing: 1.5px;
  font-family: 'Orbitron', sans-serif; margin-bottom: 3px;
}
.hp-name.p1 { color: #00ccff; text-align: left; }
.hp-name.cpu { color: #ff6600; text-align: right; }
.hp-bar-wrap {
  height: 14px; background: #111; border: 1px solid #333; border-radius: 3px;
  overflow: hidden; position: relative;
}
.hp-fill {
  height: 100%; width: 100%; border-radius: 2px;
  transition: width 0.1s, background 0.3s;
}
.hp-fill.p1-fill { background: #00ccff; float: left; }
.hp-fill.cpu-fill { background: #ff6600; float: right; }
#round-display {
  font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 800;
  color: #888; text-align: center; white-space: nowrap; padding: 0 6px; flex-shrink: 0;
}

/* ── Announce overlay ── */
#announce {
  position: absolute; left: 0; right: 0; top: 30%;
  text-align: center; z-index: 200; pointer-events: none;
  font-family: 'Orbitron', sans-serif; font-weight: 800;
  text-shadow: 0 0 30px currentColor, 0 0 60px currentColor;
  transition: opacity 0.3s;
  opacity: 0;
}
#announce.show { opacity: 1; }

/* ── Fight controller — 4 action buttons ── */
.fight-btns {
  width: 162px; height: 162px; position: relative; flex-shrink: 0;
}
.fight-btn {
  position: absolute; width: 70px; height: 70px; border-radius: 50%;
  font-family: 'Orbitron', sans-serif; font-size: 9px; font-weight: 800;
  cursor: pointer; border: none; color: #fff;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation;
  letter-spacing: 0.5px; margin: 0; flex-direction: column; gap: 1px;
}
.fight-btn span { font-size: 16px; line-height: 1; }
.fight-btn:active { transform: translateY(5px) !important; }
.fight-punch {
  background: radial-gradient(circle at 35% 35%, #ffd700, #b38700);
  box-shadow: 0 6px 0 #6b5000, inset 0 1px 0 rgba(255,255,255,0.25);
  top: 8px; right: 8px;
}
.fight-kick {
  background: radial-gradient(circle at 35% 35%, #ff4444, #cc1111);
  box-shadow: 0 6px 0 #880808, inset 0 1px 0 rgba(255,255,255,0.2);
  bottom: 8px; right: 8px;
}
.fight-special {
  background: radial-gradient(circle at 35% 35%, #a855ff, #6020cc);
  box-shadow: 0 6px 0 #3a0e88, inset 0 1px 0 rgba(255,255,255,0.2);
  top: 8px; left: 8px;
}
.fight-block {
  background: radial-gradient(circle at 35% 35%, #777, #444);
  box-shadow: 0 6px 0 #222, inset 0 1px 0 rgba(255,255,255,0.1);
  bottom: 8px; left: 8px;
}
.fight-punch:active { box-shadow: 0 1px 0 #6b5000 !important; }
.fight-kick:active   { box-shadow: 0 1px 0 #880808 !important; }
.fight-special:active{ box-shadow: 0 1px 0 #3a0e88 !important; }
.fight-block:active  { box-shadow: 0 1px 0 #222 !important; }
</style>
</head>
<body class="game-page">
<div class="wallet-bar" id="wbar" style="text-align:center;padding:4px 12px;background:rgba(0,0,0,0.4);font-size:11px"></div>
<div class="game-wrap" style="position:relative">

  <!-- HUD -->
  <div id="hud">
    <div class="hp-block">
      <div class="hp-name p1">&#9670; KODA</div>
      <div class="hp-bar-wrap"><div class="hp-fill p1-fill" id="p1-hp"></div></div>
    </div>
    <div id="round-display">RD&nbsp;1</div>
    <div class="hp-block">
      <div class="hp-name cpu">VIPER &#9670;</div>
      <div class="hp-bar-wrap" style="direction:rtl"><div class="hp-fill cpu-fill" id="cpu-hp"></div></div>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-wrap" id="cvwrap" style="flex:1;min-height:0">
    <canvas id="gc"></canvas>
  </div>

  <!-- Announce overlay -->
  <div id="announce"></div>

  <!-- Controller -->
  <div class="ctrl-area" id="ctrl-area">
    <div class="ctrl-body">

      <!-- D-pad -->
      <div class="ctrl-dpad">
        <div class="ctrl-dpad-center"></div>
        <button class="dpad-up"    id="btn-up"    ontouchstart="kdown('up',event)"    ontouchend="kup('up',event)"    onmousedown="kdown('up')"    onmouseup="kup('up')"    onmouseleave="kup('up')">&#9650;</button>
        <button class="dpad-down"  id="btn-down"  ontouchstart="kdown('down',event)"  ontouchend="kup('down',event)"  onmousedown="kdown('down')"  onmouseup="kup('down')"  onmouseleave="kup('down')">&#9660;</button>
        <button class="dpad-left"  id="btn-left"  ontouchstart="kdown('left',event)"  ontouchend="kup('left',event)"  onmousedown="kdown('left')"  onmouseup="kup('left')"  onmouseleave="kup('left')">&#9664;</button>
        <button class="dpad-right" id="btn-right" ontouchstart="kdown('right',event)" ontouchend="kup('right',event)" onmousedown="kdown('right')" onmouseup="kup('right')" onmouseleave="kup('right')">&#9654;</button>
      </div>

      <!-- Center -->
      <div class="ctrl-mid">
        <button class="ctrl-start" onclick="ctrlStart()">START</button>
        <a class="ctrl-home" href="arcade.html" title="Arcade">&#8962;</a>
      </div>

      <!-- Fight buttons -->
      <div class="fight-btns">
        <button class="fight-btn fight-special"
          ontouchstart="doAction('special',event)" onmousedown="doAction('special')">
          <span>&#9889;</span>SPEC
        </button>
        <button class="fight-btn fight-punch"
          ontouchstart="doAction('punch',event)" onmousedown="doAction('punch')">
          <span>&#9994;</span>PUNCH
        </button>
        <button class="fight-btn fight-block"
          ontouchstart="kdown('block',event)" ontouchend="kup('block',event)"
          onmousedown="kdown('block')" onmouseup="kup('block')" onmouseleave="kup('block')">
          <span>&#128737;</span>BLOCK
        </button>
        <button class="fight-btn fight-kick"
          ontouchstart="doAction('kick',event)" onmousedown="doAction('kick')">
          <span>&#129461;</span>KICK
        </button>
      </div>

    </div>
  </div>
</div>

<script>
// ─── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
const GW = 480, GH = 256;
canvas.width  = GW;
canvas.height = GH;

// Scale canvas to fill container
function resizeCanvas() {
  const wrap = document.getElementById('cvwrap');
  const availW = wrap.clientWidth;
  const availH = wrap.clientHeight;
  const scale  = Math.min(availW / GW, availH / GH);
  canvas.style.width  = Math.floor(GW * scale) + 'px';
  canvas.style.height = Math.floor(GH * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 100);

// ─── Constants ────────────────────────────────────────────────────────────────
const GROUND    = 210;
const GRAVITY   = 0.55;
const WALK_SPD  = 3.4;
const JUMP_VY   = -12;
const FW        = 42;   // fighter hitbox width
const FH        = 95;   // fighter hitbox height

const ATTACKS = {
  punch:   { dmg:10, frames:14, aStart:4,  aEnd:11, range:78,  kb:2.5 },
  kick:    { dmg:16, frames:22, aStart:5,  aEnd:15, range:86,  kb:4   },
  special: { dmg:30, frames:30, aStart:9,  aEnd:24, range:150, kb:7   },
};

// ─── Fighter configs ──────────────────────────────────────────────────────────
const P1_CFG  = { name:'KODA',  main:'#0077cc', shadow:'#004a88', skin:'#d4a574', eye:'#00f0ff', glow:'#00ccff' };
const CPU_CFG = { name:'VIPER', main:'#cc4400', shadow:'#882200', skin:'#d4a574', eye:'#ffcc00', glow:'#ff6600' };

// ─── Fighter class ────────────────────────────────────────────────────────────
class Fighter {
  constructor(x, facing, cfg) {
    this.x = x; this.y = GROUND;
    this.vx = 0; this.vy = 0;
    this.facing = facing;
    this.cfg = cfg;
    this.hp = 200; this.maxHp = 200;
    this.state = 'idle';
    this.stateTimer = 0;
    this.atk = null;
    this.atkFrame = 0;
    this.hasHit = false;
    this.invT = 0;
    this.tick = 0;
  }

  get onGround() { return this.y >= GROUND; }
  get cx() { return this.x + FW / 2; }

  canAct() { return !['punch','kick','special','hit','dead'].includes(this.state); }

  enter(s, t = 0) {
    this.state = s; this.stateTimer = t;
    this.atk = null; this.atkFrame = 0; this.hasHit = false;
  }

  attack(type) {
    if (!this.canAct()) return;
    const def = ATTACKS[type];
    this.state = type; this.stateTimer = def.frames;
    this.atk = def; this.atkFrame = 0; this.hasHit = false;
  }

  getAttackBox() {
    if (!this.atk || this.hasHit) return null;
    if (this.atkFrame < this.atk.aStart || this.atkFrame > this.atk.aEnd) return null;
    const rx = this.facing > 0 ? this.x + FW : this.x - this.atk.range;
    return { x: rx, y: this.y - FH, w: this.atk.range, h: FH };
  }

  getHurtBox() {
    if (this.state === 'dead') return null;
    return { x: this.x, y: this.y - FH, w: FW, h: FH };
  }

  takeDamage(def) {
    if (this.invT > 0 || this.state === 'dead') return false;
    let dmg = def.dmg;
    if (this.state === 'block') {
      dmg = Math.ceil(dmg * 0.1);
      this.vx -= this.facing * def.kb * 0.4;
      this.invT = 8;
      spawnParticles(this.cx, this.y - 60, '#aaa', 5);
      return true;
    }
    this.hp = Math.max(0, this.hp - dmg);
    this.vx -= this.facing * def.kb;
    this.invT = 22;
    spawnParticles(this.cx, this.y - 60, this.cfg.glow, 10);
    if (this.hp <= 0) this.enter('dead', 9999);
    else this.enter('hit', 18);
    return true;
  }

  update(opp) {
    if (this.atk) {
      this.atkFrame++;
      if (this.stateTimer > 0) this.stateTimer--;
      if (this.stateTimer <= 0) this.enter('idle');
    } else {
      if (this.stateTimer > 0) {
        this.stateTimer--;
        if (this.stateTimer <= 0 && this.state !== 'idle' && this.state !== 'dead' && this.state !== 'block') {
          this.enter('idle');
        }
      }
    }

    if (!this.onGround) this.vy += GRAVITY;
    this.x += this.vx;
    this.y = Math.min(GROUND, this.y + this.vy);

    if (this.y >= GROUND) {
      this.y = GROUND; this.vy = 0;
      if (this.state === 'jump') this.enter('idle');
    }

    this.x = Math.max(8, Math.min(GW - 8 - FW, this.x));
    if (this.onGround) this.vx *= 0.7;
    if (Math.abs(this.vx) < 0.2) this.vx = 0;

    if (['idle','walk','jump'].includes(this.state)) {
      this.facing = opp.cx > this.cx ? 1 : -1;
    }

    if (this.invT > 0) this.invT--;
    this.tick++;
  }

  draw(ctx) {
    ctx.save();
    ctx.translate(this.cx, this.y);
    if (this.facing < 0) ctx.scale(-1, 1);
    if (this.invT > 0 && Math.floor(this.invT / 3) % 2) ctx.globalAlpha = 0.3;

    const bob = Math.sin(this.tick * 0.09) * 1.5;
    const c = this.cfg;

    switch (this.state) {
      case 'dead':    this._dead(ctx, c); break;
      case 'jump':    this._jump(ctx, c); break;
      case 'punch':   this._punch(ctx, c, this.atkFrame); break;
      case 'kick':    this._kick(ctx, c, this.atkFrame); break;
      case 'special': this._special(ctx, c, this.atkFrame); break;
      case 'block':   this._block(ctx, c); break;
      case 'hit':     this._hit(ctx, c); break;
      default:        this._idle(ctx, c, bob, this.state === 'walk' ? this.tick : 0);
    }
    ctx.restore();
  }

  _r(ctx, x, y, w, h, r = 3) {
    if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill(); }
    else ctx.fillRect(x, y, w, h);
  }

  _shadow(ctx) {
    ctx.save(); ctx.globalAlpha *= 0.22;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(0, 2, 22, 5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  _head(ctx, c, yOff = 0) {
    ctx.fillStyle = c.skin;    this._r(ctx, -14, -102 + yOff, 28, 24, 8);
    ctx.fillStyle = c.main;   this._r(ctx, -14, -102 + yOff, 28, 13, 8);
    ctx.fillStyle = '#fff';   ctx.fillRect(-10, -90 + yOff, 8, 5); ctx.fillRect(2, -90 + yOff, 8, 5);
    ctx.fillStyle = c.eye;    ctx.fillRect(-9, -89 + yOff, 5, 3);  ctx.fillRect(3, -89 + yOff, 5, 3);
  }

  _idle(ctx, c, bob, wt) {
    this._shadow(ctx);
    const wk = wt ? Math.sin(wt * 0.22) * 6 : 0;
    ctx.fillStyle = c.shadow; this._r(ctx,  3, -32 + wk, 12, 32);
    ctx.fillStyle = c.main;   this._r(ctx, -15, -32 - wk, 12, 32);
    ctx.fillStyle = c.shadow; this._r(ctx,  14, -78 + bob, 10, 32);
    ctx.fillStyle = c.main;   this._r(ctx, -16, -82 + bob, 32, 44);
    ctx.fillStyle = c.shadow; this._r(ctx, -16, -40 + bob, 32, 9);
    ctx.fillStyle = c.main;   this._r(ctx, -24, -78 + bob, 10, 32);
    this._head(ctx, c, bob);
  }

  _punch(ctx, c, f) {
    const atk = ATTACKS.punch;
    const ext = f >= atk.aStart ? 30 : Math.min(30, (f - 1) * 10);
    this._shadow(ctx);
    ctx.fillStyle = c.shadow; this._r(ctx,  3, -32, 12, 32);
    ctx.fillStyle = c.main;   this._r(ctx, -15, -32, 12, 32);
    ctx.fillStyle = c.main;   this._r(ctx, -24, -78, 10, 28);
    ctx.fillStyle = c.main;   this._r(ctx, -16, -82, 32, 44);
    ctx.fillStyle = c.shadow; this._r(ctx, -16, -40, 32, 9);
    ctx.fillStyle = c.main;   ctx.fillRect(14, -79, 10 + ext, 10);
    ctx.fillStyle = c.shadow; this._r(ctx, 14 + ext, -81, 14, 14, 4);
    if (f >= atk.aStart && f <= atk.aEnd) {
      ctx.save(); ctx.globalAlpha = 0.65;
      const gx = 24 + ext, gy = -74;
      const g = ctx.createRadialGradient(gx, gy, 2, gx, gy, 22);
      g.addColorStop(0, c.glow); g.addColorStop(1, 'transparent');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(gx, gy, 22, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    this._head(ctx, c, 0);
  }

  _kick(ctx, c, f) {
    const atk = ATTACKS.kick;
    const ext = Math.min(1, f >= atk.aStart ? 1 : (f - 2) / 7);
    this._shadow(ctx);
    ctx.fillStyle = c.main;   this._r(ctx, -15, -32, 12, 32);
    ctx.fillStyle = c.shadow; this._r(ctx, 14, -78, 10, 32);
    ctx.fillStyle = c.main;   this._r(ctx, -24, -78, 10, 32);
    ctx.fillStyle = c.main;   this._r(ctx, -16, -82, 32, 44);
    ctx.fillStyle = c.shadow; this._r(ctx, -16, -40, 32, 9);
    ctx.save(); ctx.translate(10, -38); ctx.rotate(1.0 * ext);
    ctx.fillStyle = c.shadow; ctx.fillRect(-6, -58, 13, 40);
    ctx.fillStyle = c.main;   this._r(ctx, -9, -20, 20, 14, 3);
    ctx.restore();
    if (f >= atk.aStart && f <= atk.aEnd) {
      ctx.save(); ctx.globalAlpha = 0.4; ctx.strokeStyle = c.glow; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(10, -38, 50, 0.2, 1.6); ctx.stroke(); ctx.restore();
    }
    this._head(ctx, c, 0);
  }

  _special(ctx, c, f) {
    const atk = ATTACKS.special;
    const charge = Math.min(1, f / atk.aStart);
    const active = f >= atk.aStart;
    this._shadow(ctx);
    ctx.fillStyle = c.shadow; this._r(ctx,  3, -32, 12, 32);
    ctx.fillStyle = c.main;   this._r(ctx, -15, -32, 12, 32);
    const ae = active ? 28 : charge * 8;
    ctx.fillStyle = c.shadow; this._r(ctx, 4, -78, 10, 28);
    ctx.fillStyle = c.main;   this._r(ctx, -16, -82, 32, 44);
    ctx.fillStyle = c.shadow; this._r(ctx, -16, -40, 32, 9);
    ctx.fillStyle = c.main;   ctx.fillRect(-14, -72, 10 + ae, 9); ctx.fillRect(4, -72, 10 + ae, 9);
    if (active) {
      const bx = -4 + ae + 28, by = -68;
      const bs = 14 + (f - atk.aStart) * 0.9;
      ctx.save();
      const g = ctx.createRadialGradient(bx, by, 2, bx, by, bs);
      g.addColorStop(0, '#fff'); g.addColorStop(0.3, c.glow); g.addColorStop(1, 'transparent');
      ctx.fillStyle = g; ctx.globalAlpha = 0.92;
      ctx.beginPath(); ctx.arc(bx, by, bs, 0, Math.PI*2); ctx.fill();
      // Ring
      ctx.globalAlpha = 0.4; ctx.strokeStyle = c.glow; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(bx, by, bs + 6, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
    } else if (charge > 0.2) {
      ctx.save(); ctx.globalAlpha = charge * 0.6;
      const g = ctx.createRadialGradient(-4, -68, 1, -4, -68, 18 * charge);
      g.addColorStop(0, c.glow); g.addColorStop(1, 'transparent');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(-4, -68, 18 * charge, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    this._head(ctx, c, 0);
  }

  _block(ctx, c) {
    this._shadow(ctx);
    ctx.fillStyle = c.shadow; this._r(ctx,  1, -28, 11, 28);
    ctx.fillStyle = c.main;   this._r(ctx, -12, -28, 11, 28);
    ctx.fillStyle = c.main;   this._r(ctx, -14, -78, 28, 40);
    ctx.fillStyle = c.shadow; this._r(ctx, -14, -40, 28, 9);
    ctx.fillStyle = c.main;   this._r(ctx, -20, -84, 10, 42, 4); this._r(ctx, 10, -84, 10, 42, 4);
    this._r(ctx, -20, -84, 40, 13, 4);
    ctx.fillStyle = c.skin;   this._r(ctx, -12, -102, 24, 22, 8);
    ctx.fillStyle = c.main;   this._r(ctx, -12, -102, 24, 12, 8);
    ctx.fillStyle = c.eye;    ctx.fillRect(-6, -92, 5, 4); ctx.fillRect(1, -92, 5, 4);
    ctx.save(); ctx.globalAlpha = 0.2;
    const g = ctx.createRadialGradient(0, -58, 5, 0, -58, 38);
    g.addColorStop(0, c.glow); g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.fillRect(-26, -92, 52, 72); ctx.restore();
  }

  _hit(ctx, c) {
    this._shadow(ctx);
    ctx.save(); ctx.rotate(0.18);
    ctx.fillStyle = c.shadow; this._r(ctx,  3, -32, 12, 32);
    ctx.fillStyle = c.main;   this._r(ctx, -15, -32, 12, 32);
    ctx.fillStyle = c.shadow; this._r(ctx,  14, -78, 10, 32);
    ctx.fillStyle = c.main;   this._r(ctx, -24, -78, 10, 32);
    ctx.fillStyle = c.main;   this._r(ctx, -16, -82, 32, 44);
    ctx.fillStyle = c.shadow; this._r(ctx, -16, -40, 32, 9);
    this._head(ctx, c, 0); ctx.restore();
    ctx.save(); ctx.globalAlpha = 0.45; ctx.fillStyle = '#ff3333';
    ctx.beginPath(); ctx.arc(8, -58, 34, 0, Math.PI*2); ctx.fill(); ctx.restore();
  }

  _jump(ctx, c) {
    ctx.save(); ctx.translate(6, -22); ctx.rotate(-0.45);
    ctx.fillStyle = c.shadow; ctx.fillRect(-6, -20, 12, 20); ctx.restore();
    ctx.save(); ctx.translate(-10, -22); ctx.rotate(0.45);
    ctx.fillStyle = c.main;   ctx.fillRect(-6, -20, 12, 20); ctx.restore();
    ctx.save(); ctx.translate(20, -66); ctx.rotate(0.5);
    ctx.fillStyle = c.shadow; this._r(ctx, -5, -14, 10, 28); ctx.restore();
    ctx.save(); ctx.translate(-20, -66); ctx.rotate(-0.5);
    ctx.fillStyle = c.main;   this._r(ctx, -5, -14, 10, 28); ctx.restore();
    ctx.fillStyle = c.main;   this._r(ctx, -16, -82, 32, 44);
    ctx.fillStyle = c.shadow; this._r(ctx, -16, -40, 32, 9);
    this._head(ctx, c, 0);
  }

  _dead(ctx, c) {
    ctx.save(); ctx.translate(this.facing * 18, -8); ctx.rotate(this.facing * 1.55);
    ctx.fillStyle = c.shadow; this._r(ctx,  3, -32, 12, 32);
    ctx.fillStyle = c.main;   this._r(ctx, -15, -32, 12, 32);
    ctx.fillStyle = c.shadow; this._r(ctx,  14, -78, 10, 32);
    ctx.fillStyle = c.main;   this._r(ctx, -24, -78, 10, 32);
    ctx.fillStyle = c.main;   this._r(ctx, -16, -82, 32, 44);
    ctx.fillStyle = c.shadow; this._r(ctx, -16, -40, 32, 9);
    ctx.fillStyle = c.skin;   this._r(ctx, -14, -102, 28, 24, 8);
    ctx.fillStyle = c.main;   this._r(ctx, -14, -102, 28, 13, 8);
    ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-9,-90); ctx.lineTo(-3,-84); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-3,-90); ctx.lineTo(-9,-84); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(3, -90); ctx.lineTo(9, -84);  ctx.stroke();
    ctx.beginPath(); ctx.moveTo(9, -90); ctx.lineTo(3, -84);  ctx.stroke();
    ctx.restore();
  }
}

// ─── CPU AI ───────────────────────────────────────────────────────────────────
class CpuAI {
  constructor(fighter) { this.f = fighter; this.timer = 0; }
  update(player) {
    const f = this.f, p = player;
    if (f.state === 'dead' || p.state === 'dead') return;
    if (!f.canAct()) return;
    if (this.timer > 0) { this.timer--; return; }
    const dist = Math.abs(f.cx - p.cx);
    const r = Math.random();
    if (dist > 210) {
      f.vx = f.facing * WALK_SPD; f.state = 'walk'; this.timer = 14;
    } else if (dist > 110) {
      if (r < 0.12) { f.vy = JUMP_VY; f.state = 'jump'; f.vx = f.facing * WALK_SPD * 0.7; this.timer = 28; }
      else { f.vx = f.facing * WALK_SPD; f.state = 'walk'; this.timer = 10; }
    } else if (dist < 75) {
      if (r < 0.07)       { f.state = 'block'; this.timer = 18; }
      else if (r < 0.45)  { f.attack('punch'); this.timer = 18; }
      else if (r < 0.70)  { f.attack('kick');  this.timer = 24; }
      else if (r < 0.82)  { f.vx = -f.facing * WALK_SPD * 1.5; this.timer = 10; }
      else if (r < 0.93)  { f.attack('special'); this.timer = 36; }
      else { f.vy = JUMP_VY * 0.75; f.state = 'jump'; this.timer = 24; }
    } else {
      if (r < 0.07)       { f.state = 'block'; this.timer = 16; }
      else if (r < 0.36)  { f.attack('punch'); this.timer = 18; }
      else if (r < 0.58)  { f.attack('kick');  this.timer = 24; }
      else if (r < 0.70)  { f.attack('special'); this.timer = 36; }
      else { f.vx = f.facing * WALK_SPD; f.state = 'walk'; this.timer = 8; }
    }
  }
}

// ─── Particles ────────────────────────────────────────────────────────────────
const parts = [];
function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 2 + Math.random() * 5;
    parts.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 2,
      life: 18 + Math.random()*14, ml: 28, color, size: 2 + Math.random()*3 });
  }
}
function tickParticles() {
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life--;
    if (p.life <= 0) parts.splice(i, 1);
  }
}
function drawParticles() {
  parts.forEach(p => {
    ctx.save(); ctx.globalAlpha = p.life / p.ml;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

// ─── Background ───────────────────────────────────────────────────────────────
function drawBG() {
  const now = Date.now();
  // Sky
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND);
  sky.addColorStop(0, '#04000a'); sky.addColorStop(1, '#180012');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, GW, GROUND);

  // Back wall stones
  ctx.fillStyle = '#0e000c';
  for (let i = 0; i < 8; i++) {
    ctx.fillRect(i * 60, 0, 58, GROUND);
    ctx.fillStyle = '#0b000a'; ctx.fillRect(i * 60, 0, 58, 2); ctx.fillStyle = '#0e000c';
  }
  // Pillars
  const pillarX = [50, GW - 50, 180, GW - 180];
  pillarX.forEach(px => {
    const g = ctx.createLinearGradient(px - 18, 0, px + 18, 0);
    g.addColorStop(0, '#120010'); g.addColorStop(0.5, '#200018'); g.addColorStop(1, '#120010');
    ctx.fillStyle = g; ctx.fillRect(px - 18, 0, 36, GROUND);
    ctx.fillStyle = '#2a001e'; ctx.fillRect(px - 18, 0, 36, 12);
    ctx.fillStyle = '#2a001e'; ctx.fillRect(px - 18, GROUND - 14, 36, 14);
  });

  // Torches
  [30, GW - 30].forEach(tx => {
    const ty = GROUND - 82;
    ctx.fillStyle = '#3a1a00'; ctx.fillRect(tx - 5, ty, 10, 22);
    ctx.fillStyle = '#5a2a00'; ctx.fillRect(tx - 7, ty - 6, 14, 8);
    const fl = (Math.sin(now / 80) * 3);
    const fl2 = (Math.cos(now / 60) * 2);
    ctx.save(); ctx.translate(tx, ty);
    const fg = ctx.createRadialGradient(fl, -18, 2, fl2, -24, 20);
    fg.addColorStop(0, '#fff8e0'); fg.addColorStop(0.3, '#ff9900');
    fg.addColorStop(0.7, '#ff2200'); fg.addColorStop(1, 'transparent');
    ctx.fillStyle = fg; ctx.globalAlpha = 0.9;
    ctx.beginPath(); ctx.ellipse(fl, -18, 8, 20, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // Glow on ground
    ctx.save(); ctx.globalAlpha = 0.07;
    const tg = ctx.createRadialGradient(tx, GROUND - 60, 4, tx, GROUND, 90);
    tg.addColorStop(0, '#ff8800'); tg.addColorStop(1, 'transparent');
    ctx.fillStyle = tg; ctx.fillRect(tx - 90, GROUND - 90, 180, 90);
    ctx.restore();
  });

  // Skulls on pillars
  [50, GW - 50].forEach(px => {
    ctx.save(); ctx.translate(px, GROUND - 28);
    ctx.fillStyle = '#ffffff15';
    ctx.beginPath(); ctx.arc(0, -8, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(-3, -2, 6, 4);
    ctx.restore();
  });

  // Ground
  const gr = ctx.createLinearGradient(0, GROUND, 0, GH);
  gr.addColorStop(0, '#200008'); gr.addColorStop(1, '#0d0003');
  ctx.fillStyle = gr; ctx.fillRect(0, GROUND, GW, GH - GROUND);
  ctx.fillStyle = '#aa000022'; ctx.fillRect(0, GROUND - 2, GW, 3);

  // Ground cracks/marks
  ctx.strokeStyle = '#aa000018'; ctx.lineWidth = 1;
  [130, 240, 350].forEach(lx => {
    ctx.beginPath(); ctx.moveTo(lx, GROUND); ctx.lineTo(lx + 20, GH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(lx, GROUND); ctx.lineTo(lx - 15, GH); ctx.stroke();
  });
}

// ─── Game state ───────────────────────────────────────────────────────────────
let player, cpuFighter, cpuAI;
let phase = 'idle'; // idle | countdown | fight | ko | gameover
let announceEl, shakeX = 0, announceTimeout = null;
let sessionActive = false;

function initFighters() {
  player     = new Fighter(80,   1, P1_CFG);
  cpuFighter = new Fighter(GW - 80 - FW, -1, CPU_CFG);
  cpuAI      = new CpuAI(cpuFighter);
  parts.length = 0;
}

function showAnnounce(text, size, color, dur) {
  const el = document.getElementById('announce');
  if (!el) return;
  el.textContent = text;
  el.style.fontSize = size + 'px';
  el.style.color = color;
  el.classList.add('show');
  if (announceTimeout) clearTimeout(announceTimeout);
  announceTimeout = setTimeout(() => el.classList.remove('show'), dur);
}

function updateHUD() {
  const p1 = document.getElementById('p1-hp');
  const cp = document.getElementById('cpu-hp');
  if (!p1 || !cp) return;
  const pp = Math.max(0, player.hp / player.maxHp * 100);
  const cp2= Math.max(0, cpuFighter.hp / cpuFighter.maxHp * 100);
  p1.style.width  = pp + '%';
  cp.style.width  = cp2 + '%';
  p1.style.background  = pp > 50 ? '#00ccff' : pp > 25 ? '#ffdd00' : '#ff3333';
  cp.style.background  = cp2 > 50 ? '#ff6600' : cp2 > 25 ? '#ffdd00' : '#ff2200';
}

function startFight() {
  initFighters();
  phase = 'countdown';
  showAnnounce('FIGHT!', 48, '#ffd700', 1200);
  setTimeout(() => { phase = 'fight'; }, 1000);
}

function checkKO() {
  if (phase !== 'fight') return;
  if (player.state === 'dead' || cpuFighter.state === 'dead') {
    phase = 'ko';
    const playerWon = cpuFighter.state === 'dead';
    shakeX = 12;
    setTimeout(() => {
      if (playerWon) {
        showAnnounce('K.O.!', 52, '#ffd700', 2500);
        setTimeout(() => showAnnounce('YOU WIN!', 36, '#00ff9d', 2500), 800);
      } else {
        showAnnounce('K.O.!', 52, '#ff3333', 2500);
        setTimeout(() => showAnnounce('FINISH HIM...', 28, '#ff4400', 3000), 900);
      }
      setTimeout(() => endGame(playerWon), 3200);
    }, 600);
  }
}

function endGame(playerWon) {
  phase = 'gameover';
  const score = playerWon ? Math.round(player.hp / player.maxHp * 2000) : 0;
  if (sessionActive) {
    arcadeSubmitScore('fighter', score).catch(() => {});
    sessionActive = false;
  }

  // Show result card
  const box = document.createElement('div');
  box.style.cssText = 'position:fixed;inset:0;background:rgba(2,0,8,0.95);z-index:9999;display:flex;align-items:center;justify-content:center;font-family:Orbitron,sans-serif';
  box.innerHTML = `
    <div style="background:linear-gradient(160deg,#0d0012,#18000a);border:2px solid ${playerWon?'#ffd700':'#ff3333'};border-radius:20px;padding:30px 24px;width:min(340px,92vw);text-align:center">
      <div style="font-size:44px;margin-bottom:10px">${playerWon ? '&#127942;' : '&#128128;'}</div>
      <div style="font-size:22px;font-weight:800;color:${playerWon?'#ffd700':'#ff3333'};margin-bottom:16px">${playerWon?'VICTORY!':'DEFEATED'}</div>
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #ffffff10;font-size:12px">
        <span style="color:#888">Your HP</span>
        <span style="color:#00ccff;font-weight:700">${player.hp} / ${player.maxHp}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #ffffff10;font-size:12px">
        <span style="color:#888">CPU HP</span>
        <span style="color:#ff6600;font-weight:700">${cpuFighter.hp} / ${cpuFighter.maxHp}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:8px 0;font-size:12px">
        <span style="color:#888">Score</span>
        <span style="color:#ffd700;font-weight:700">${score}</span>
      </div>
      <button onclick="location.href='fighter.html'" style="margin-top:16px;width:100%;padding:12px;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,#a855ff,#7c3aed);color:#fff;font-family:Orbitron,sans-serif;font-size:12px;font-weight:800">REMATCH</button>
      <button onclick="location.href='arcade.html'" style="margin-top:8px;width:100%;padding:10px;border-radius:12px;border:1px solid #333;cursor:pointer;background:transparent;color:#888;font-family:Orbitron,sans-serif;font-size:10px">&#8592; ARCADE</button>
    </div>`;
  document.body.appendChild(box);
}

// ─── Input ────────────────────────────────────────────────────────────────────
const keys = { left:false, right:false, up:false, down:false, block:false };

function kdown(k, e) { if (e) e.preventDefault(); keys[k] = true; }
function kup(k, e)   { if (e) e.preventDefault(); keys[k] = false; }
function doAction(type, e) {
  if (e) e.preventDefault();
  if (phase !== 'fight' || !player) return;
  player.attack(type);
}
function ctrlStart(e) {
  if (phase === 'idle' || phase === 'gameover') return;
  if (phase === 'fight') return;
  startFight();
}

document.addEventListener('keydown', e => {
  switch (e.code) {
    case 'ArrowLeft':  case 'KeyA': keys.left  = true; break;
    case 'ArrowRight': case 'KeyD': keys.right = true; break;
    case 'ArrowUp':    case 'KeyW': if (phase==='fight'&&player?.onGround&&player?.canAct()){player.vy=JUMP_VY;player.state='jump';} break;
    case 'ArrowDown':  case 'KeyS': keys.down  = true; break;
    case 'KeyZ': case 'KeyJ': doAction('punch'); break;
    case 'KeyX': case 'KeyK': doAction('kick');  break;
    case 'KeyC': case 'KeyL': doAction('special'); break;
    case 'ShiftLeft': case 'ShiftRight': keys.block = true; break;
    case 'Enter': case 'Space': if (phase === 'idle') startFight(); break;
  }
});
document.addEventListener('keyup', e => {
  switch (e.code) {
    case 'ArrowLeft':  case 'KeyA': keys.left  = false; break;
    case 'ArrowRight': case 'KeyD': keys.right = false; break;
    case 'ArrowDown':  case 'KeyS': keys.down  = false; break;
    case 'ShiftLeft': case 'ShiftRight': keys.block = false; break;
  }
});

function processInput() {
  if (phase !== 'fight' || !player) return;
  const p = player;
  if (!p.canAct()) return;

  if (keys.block) {
    p.state = 'block'; return;
  }
  if (p.state === 'block') p.enter('idle');

  if (keys.up && p.onGround) { p.vy = JUMP_VY; p.state = 'jump'; return; }

  if (keys.left)  { p.vx = -WALK_SPD; if (p.onGround) p.state = 'walk'; }
  else if (keys.right) { p.vx = WALK_SPD; if (p.onGround) p.state = 'walk'; }
  else if (p.onGround && p.state === 'walk') p.enter('idle');
}

// ─── Collision check ──────────────────────────────────────────────────────────
function boxOverlap(a, b) {
  if (!a || !b) return false;
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function checkHits() {
  if (phase !== 'fight') return;
  // Player attacks CPU
  const paBox = player.getAttackBox();
  const cHurt = cpuFighter.getHurtBox();
  if (paBox && cHurt && boxOverlap(paBox, cHurt) && !player.hasHit) {
    player.hasHit = true;
    cpuFighter.takeDamage(player.atk);
    shakeX = player.atk.kb;
  }
  // CPU attacks player
  const caBox = cpuFighter.getAttackBox();
  const pHurt = player.getHurtBox();
  if (caBox && pHurt && boxOverlap(caBox, pHurt) && !cpuFighter.hasHit) {
    cpuFighter.hasHit = true;
    player.takeDamage(cpuFighter.atk);
    shakeX = cpuFighter.atk.kb;
  }
}

// ─── Main loop ────────────────────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);

  // Screen shake decay
  if (shakeX > 0) shakeX *= 0.72;
  const sx = shakeX > 0.5 ? (Math.random() - 0.5) * shakeX * 2 : 0;
  const sy = shakeX > 0.5 ? (Math.random() - 0.5) * shakeX : 0;

  ctx.save();
  if (sx || sy) ctx.translate(sx, sy);

  drawBG();

  if (player) {
    processInput();
    player.update(cpuFighter);
    cpuFighter.update(player);
    cpuAI.update(player);
    checkHits();
    checkKO();
    tickParticles();
    updateHUD();
    drawParticles();
    cpuFighter.draw(ctx);
    player.draw(ctx);
  }

  // Idle screen
  if (phase === 'idle') {
    ctx.fillStyle = '#ffd70099';
    ctx.font = 'bold 14px Orbitron, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('PRESS START OR SPACE TO BEGIN', GW/2, GROUND/2);
  }

  ctx.restore();
}

// ─── Pay gate + init ──────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderWalletBar('wbar');
  initFighters();
  loop();

  showPayGate('fighter', () => {
    sessionActive = true;
    startFight();
  }, { pot: 'Win 80% back', rake: '20%' });
});
</script>

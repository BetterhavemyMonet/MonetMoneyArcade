<body class="game-page">
<div class="wallet-bar" id="wbar"></div>
<div class="gw">
  <div class="arena"><canvas id="gc"></canvas></div>
  <div class="ctrl">
    <div class="cbpair">
      <button class="cb lft"
        ontouchstart="setBtn('left',true,event)" ontouchend="setBtn('left',false)"
        onmousedown="setBtn('left',true)" onmouseup="setBtn('left',false)"
        onmouseleave="setBtn('left',false)"><span style="font-size:26px">&#9664;</span><span style="font-size:9px;opacity:.7">STEER</span></button>
      <button class="cb rgt"
        ontouchstart="setBtn('right',true,event)" ontouchend="setBtn('right',false)"
        onmousedown="setBtn('right',true)" onmouseup="setBtn('right',false)"
        onmouseleave="setBtn('right',false)"><span style="font-size:26px">&#9654;</span><span style="font-size:9px;opacity:.7">STEER</span></button>
    </div>
    <a class="home" href="arcade.html">&#8962;</a>
    <div class="cbpair">
      <button class="cb thr"
        ontouchstart="setBtn('throttle',true,event)" ontouchend="setBtn('throttle',false)"
        onmousedown="setBtn('throttle',true)" onmouseup="setBtn('throttle',false)"
        onmouseleave="setBtn('throttle',false)"><span style="font-size:18px">&#9889;</span><span style="font-size:9px">THROTTLE</span></button>
      <button class="cb trb"
        ontouchstart="setBtn('turbo',true,event)" ontouchend="setBtn('turbo',false)"
        onmousedown="setBtn('turbo',true)" onmouseup="setBtn('turbo',false)"
        onmouseleave="setBtn('turbo',false)"><span style="font-size:18px">&#128293;</span><span style="font-size:9px">TURBO</span></button>
    </div>
  </div>
</div>
<script>
const C=document.getElementById('gc'),X=C.getContext('2d');
const dinoImg=new Image(); dinoImg.src='/dino-sprite.png';
const LW=480,LH=270;
let SC=1;

function resize(){
  const p=C.parentElement;
  SC=Math.min(p.clientWidth/LW,p.clientHeight/LH);
  C.width=Math.floor(LW*SC);C.height=Math.floor(LH*SC);
}
window.addEventListener('resize',resize);
resize();

// Track constants
const HORIZON_Y=LH*0.38; // y position of horizon line
const GROUND_Y=LH-40;    // bottom of track
const TRACK_LEFT=60;      // left edge of track at player's position
const TRACK_RIGHT=LW-60;  // right edge
const PLAYER_X=110;       // player's fixed x position (screen)

// Player bike state
let bike={
  trackY: 0,       // y on the track (0=center)
  airY: 0,         // air height above track (0=on ground)
  airVY: 0,        // vertical velocity in air
  speed: 0,        // current forward speed (px/frame of scroll)
  heat: 0,         // 0..100 overheat
  stalled: false,  // engine stalled from overheat
  stallTimer: 0,
  lean: 0,         // visual lean angle
  wheelie: 0,      // wheelie lean
};

let keys={throttle:false,turbo:false,left:false,right:false};
function setBtn(k,v,e){ if(e)e.preventDefault(); keys[k]=v; }
let score=0; // distance in meters
let gameRunning=false;
let animId=null;
let phase='ready';
let frameCount=0;

// Track segment types
const SEG_FLAT=0, SEG_RAMP_UP=1, SEG_RAMP_DOWN=2, SEG_MUD=3, SEG_BUMP=4;

// Procedural track segments ahead of player
let trackSegs=[];
let segOffset=0; // how far into current segment (in track-units)
const SEG_LEN=200; // px of scroll per segment

function genSeg(){
  const types=[SEG_FLAT,SEG_FLAT,SEG_FLAT,SEG_RAMP_UP,SEG_RAMP_DOWN,SEG_MUD,SEG_BUMP];
  const t=types[Math.floor(Math.random()*types.length)];
  return {type:t,len:SEG_LEN+(Math.random()-0.5)*80,progress:0};
}

// Initialize with some flat track
for(let i=0;i<8;i++) trackSegs.push(i<3?{type:SEG_FLAT,len:SEG_LEN,progress:0}:genSeg());

// Current ground offset for bike (how high/low relative to horizon)
let groundOffset=0;    // current track surface y offset from GROUND_Y
let groundOffsetTarget=0;
let rampAngle=0;       // visual ramp incline

// Background parallax layers
let bgOffset1=0, bgOffset2=0;

// Road markings scroll
let roadScroll=0;

// Obstacles on track
let obstacles=[];
let obsTimer=0;

function spawnObs(){
  const types=['cone','oil','boulder'];
  const t=types[Math.floor(Math.random()*types.length)];
  obstacles.push({type:t,x:LW+40,trackY:(Math.random()-0.5)*60});
}

function maxSpeed(){
  return bike.stalled?0:3.5+(score/2000)*0.8;
}

function update(){
  if(!gameRunning||phase!=='play') return;
  frameCount++;

  const MAX=maxSpeed();

  // Throttle / turbo
  if(!bike.stalled){
    if(keys.turbo&&bike.heat<100){
      bike.speed=Math.min(MAX*1.9,bike.speed+0.18);
      bike.heat=Math.min(100,bike.heat+1.1);
      bike.wheelie=Math.min(0.35,bike.wheelie+0.03);
    } else if(keys.throttle){
      bike.speed=Math.min(MAX,bike.speed+0.12);
      bike.heat=Math.max(0,bike.heat-0.4);
      bike.wheelie=Math.max(0,bike.wheelie-0.04);
    } else {
      bike.speed=Math.max(0,bike.speed-0.18);
      bike.heat=Math.max(0,bike.heat-0.8);
      bike.wheelie=Math.max(0,bike.wheelie-0.06);
    }
  }

  // Stall logic
  if(bike.heat>=100&&!bike.stalled){
    bike.stalled=true; bike.stallTimer=120; bike.speed=0; bike.wheelie=0;
  }
  if(bike.stalled){
    bike.stallTimer--;
    bike.heat=Math.max(0,bike.heat-0.8);
    if(bike.stallTimer<=0){ bike.stalled=false; }
  }

  // Left/right
  if(keys.left){ bike.trackY=Math.max(-70,bike.trackY-3); bike.lean=-0.25; }
  else if(keys.right){ bike.trackY=Math.min(70,bike.trackY+3); bike.lean=0.25; }
  else { bike.lean*=0.85; }

  // Score
  score+=bike.speed*0.3;

  // Road scroll
  roadScroll=(roadScroll+bike.speed*4)%80;
  bgOffset1=(bgOffset1+bike.speed*0.5)%LW;
  bgOffset2=(bgOffset2+bike.speed*1.2)%LW;

  // Track segment processing
  segOffset+=bike.speed;
  if(trackSegs.length>0){
    const seg=trackSegs[0];
    seg.progress=segOffset/seg.len;
    if(segOffset>=seg.len){ segOffset-=seg.len; trackSegs.shift(); trackSegs.push(genSeg()); }
  }

  // Ground offset animation
  const seg=trackSegs[0];
  if(seg.type===SEG_RAMP_UP){
    const p=Math.min(1,seg.progress);
    groundOffsetTarget=-40*Math.sin(p*Math.PI);
    rampAngle=-0.18*Math.sin(p*Math.PI);
    if(p>0.35&&p<0.65&&bike.airY===0){
      bike.airVY=-4-bike.speed*0.6; // launch!
    }
  } else if(seg.type===SEG_RAMP_DOWN){
    const p=Math.min(1,seg.progress);
    groundOffsetTarget=20*Math.sin(p*Math.PI);
    rampAngle=0.12*Math.sin(p*Math.PI);
  } else if(seg.type===SEG_BUMP){
    const p=Math.min(1,seg.progress);
    groundOffsetTarget=-15*Math.sin(p*Math.PI*2);
    rampAngle=0;
    if(bike.airY===0&&p>0.2&&p<0.4){ bike.airVY=-2; }
  } else {
    groundOffsetTarget*=0.9;
    rampAngle*=0.92;
  }
  groundOffset+=(groundOffsetTarget-groundOffset)*0.12;

  // Air physics
  if(bike.airY<0||bike.airVY<0){
    bike.airVY+=0.4;
    bike.airY+=bike.airVY;
    if(bike.airY>=0){ bike.airY=0; bike.airVY=0; }
  }

  // Mud slow
  if(seg.type===SEG_MUD){ bike.speed=Math.max(0,bike.speed-0.15); }

  // Obstacle spawning
  obsTimer++;
  if(obsTimer>Math.max(80,160-score/200)){ obsTimer=0; spawnObs(); }

  // Update obstacles
  obstacles=obstacles.filter(o=>{
    o.x-=bike.speed*4+2;
    if(o.x<-40) return false;
    // Collision check (only if on ground)
    if(bike.airY===0){
      const ox=PLAYER_X+30, oy=GROUND_Y+groundOffset;
      const dx=ox-o.x, dy=(oy+bike.trackY*0.15)-(GROUND_Y+o.trackY*0.15);
      if(Math.abs(dx)<28&&Math.abs(dy)<20){
        if(o.type==='oil'){ bike.speed=Math.max(0,bike.speed-1.5); }
        else { bike.speed=Math.max(0,bike.speed-2.5); score=Math.max(0,score-50); }
        return false;
      }
    }
    return true;
  });
}

function drawBike(cx,cy,lean,wheelie,speed){
  X.save(); X.translate(cx,cy);
  const wl=lean*0.3+wheelie;
  X.rotate(wl);
  // Shadow
  X.fillStyle='rgba(0,0,0,0.3)';
  X.beginPath();X.ellipse(0,28,22,4,0,0,Math.PI*2);X.fill();
  // Rear wheel
  X.strokeStyle='#555';X.lineWidth=4;
  X.beginPath();X.arc(-20,20,12,0,Math.PI*2);X.stroke();
  X.strokeStyle='#888';X.lineWidth=2;
  X.beginPath();X.arc(-20,20,12,0,Math.PI*2);X.stroke();
  // Front wheel
  X.strokeStyle='#555';X.lineWidth=4;
  X.beginPath();X.arc(20,18,10,0,Math.PI*2);X.stroke();
  X.strokeStyle='#888';X.lineWidth=2;
  X.beginPath();X.arc(20,18,10,0,Math.PI*2);X.stroke();
  // Frame
  X.strokeStyle='#cc2200';X.lineWidth=3;
  X.beginPath();X.moveTo(-20,10);X.lineTo(20,8);X.stroke();
  X.beginPath();X.moveTo(-10,10);X.lineTo(0,-8);X.lineTo(20,5);X.stroke();
  // Handlebars
  X.strokeStyle='#888';X.lineWidth=2;
  X.beginPath();X.moveTo(14,-8);X.lineTo(22,-12);X.stroke();
  // Exhaust
  X.strokeStyle='#444';X.lineWidth=3;
  X.beginPath();X.moveTo(-20,12);X.lineTo(-30,18);X.stroke();
  if(speed>2.5){
    X.strokeStyle='rgba(255,100,0,0.7)';X.lineWidth=2;
    X.beginPath();X.moveTo(-30,18);X.lineTo(-38+Math.random()*4,22);X.stroke();
  }
  // Rider — dino character
  if(dinoImg.complete && dinoImg.naturalWidth){
    X.drawImage(dinoImg,-14,-30,28,30);
  } else {
    X.fillStyle='#00ff9d';
    X.beginPath();X.arc(5,-14,9,0,Math.PI*2);X.fill();
  }
  X.restore();
}

function drawObstacle(o){
  const screenX=o.x;
  const groundY=GROUND_Y+groundOffset;
  const oy=groundY+o.trackY*0.15-10;
  X.save(); X.translate(screenX,oy);
  if(o.type==='cone'){
    X.fillStyle='#ff6600';
    X.beginPath();X.moveTo(0,-16);X.lineTo(12,0);X.lineTo(-12,0);X.closePath();X.fill();
    X.fillStyle='#fff';
    X.fillRect(-8,-8,16,3);
  } else if(o.type==='oil'){
    X.fillStyle='rgba(80,0,120,0.8)';
    X.beginPath();X.ellipse(0,4,20,8,0,0,Math.PI*2);X.fill();
    X.fillStyle='rgba(150,0,255,0.5)';
    X.font='7px monospace';X.fillText('OIL',-8,6);
  } else {
    X.fillStyle='#555';
    X.fillRect(-12,-12,24,12);
    X.fillStyle='#666';
    X.fillRect(-10,-14,20,4);
  }
  X.restore();
}

function drawTrack(){
  const gy=GROUND_Y+groundOffset;
  // Sky gradient
  const sky=X.createLinearGradient(0,0,0,gy);
  sky.addColorStop(0,'#050510');
  sky.addColorStop(0.6,'#0a0520');
  sky.addColorStop(1,'#180520');
  X.fillStyle=sky;X.fillRect(0,0,LW,gy);

  // Horizon glow
  X.fillStyle='rgba(180,0,255,0.15)';
  X.fillRect(0,gy-8,LW,16);

  // Stars
  X.fillStyle='rgba(255,255,255,0.5)';
  for(let i=0;i<40;i++){
    const sx=((i*137+bgOffset1)%LW);
    const sy=((i*79)%(gy-20));
    X.fillRect(sx,sy,1,1);
  }

  // Background buildings
  X.fillStyle='rgba(30,0,60,0.8)';
  for(let i=0;i<8;i++){
    const bx=((i*90+bgOffset2*0.3)%LW);
    const bh=30+((i*47)%40);
    X.fillRect(bx,gy-bh,25,bh);
  }

  // Track surface
  const seg=trackSegs[0]||{type:SEG_FLAT};
  let trackColor='#1a1a2a';
  if(seg.type===SEG_MUD) trackColor='#2a1a0a';
  X.fillStyle=trackColor;
  X.fillRect(0,gy,LW,LH-gy);

  // Track lane lines (scrolling)
  const laneY=gy+8;
  X.strokeStyle='rgba(0,240,255,0.4)';X.lineWidth=2;X.setLineDash([30,50]);
  X.lineDashOffset=-roadScroll;
  X.beginPath();X.moveTo(0,laneY);X.lineTo(LW,laneY);X.stroke();
  X.setLineDash([]);

  // Track edges
  X.strokeStyle='#00f0ff';X.lineWidth=2;
  X.beginPath();X.moveTo(0,gy);X.lineTo(LW,gy);X.stroke();
  X.strokeStyle='rgba(0,240,255,0.3)';X.lineWidth=1;
  X.beginPath();X.moveTo(0,gy+1);X.lineTo(LW,gy+1);X.stroke();

  // Ground pattern
  X.strokeStyle='rgba(0,240,255,0.12)';X.lineWidth=1;
  for(let i=0;i<6;i++){
    const lineY=gy+15+i*18;
    if(lineY<LH){
      X.beginPath();X.moveTo(0,lineY);X.lineTo(LW,lineY);X.stroke();
    }
  }

  // Ramp visual
  if(Math.abs(rampAngle)>0.02){
    const rampH=Math.abs(groundOffset);
    const rampDir=rampAngle<0?1:-1;
    X.fillStyle='rgba(0,180,255,0.25)';
    X.beginPath();
    if(rampDir>0){
      X.moveTo(PLAYER_X+60,gy);
      X.lineTo(PLAYER_X+160,gy-rampH*1.5);
      X.lineTo(PLAYER_X+160,gy);
      X.closePath();
    } else {
      X.moveTo(PLAYER_X+60,gy-rampH*1.5);
      X.lineTo(PLAYER_X+160,gy);
      X.lineTo(PLAYER_X+60,gy);
      X.closePath();
    }
    X.fill();
  }
}

function drawHUD(){
  // Score (distance)
  const meters=Math.floor(score);
  X.fillStyle='#00f0ff'; X.font='bold 11px Orbitron,sans-serif';
  X.fillText('DIST: '+meters+'m', 6, 16);

  // Speed bar
  const sp=bike.speed/6;
  X.fillStyle='#111';X.fillRect(LW-100,5,94,10);
  X.fillStyle=sp>0.8?'#ff2244':'#00f0ff';
  X.fillRect(LW-100,5,Math.floor(94*sp),10);
  X.strokeStyle='#333';X.lineWidth=1;X.strokeRect(LW-100,5,94,10);
  X.fillStyle='#888';X.font='7px Orbitron,sans-serif';
  X.fillText('SPEED',LW-100,28);

  // Overheat bar
  const ht=bike.heat/100;
  X.fillStyle='#111';X.fillRect(LW-100,32,94,10);
  const hc=ht>0.8?'#ff2244':ht>0.5?'#ff8800':'#00ff9d';
  X.fillStyle=hc;
  X.fillRect(LW-100,32,Math.floor(94*ht),10);
  X.strokeStyle='#333';X.lineWidth=1;X.strokeRect(LW-100,32,94,10);
  X.fillStyle='#888';X.font='7px Orbitron,sans-serif';
  X.fillText('HASH TEMP',LW-100,55);

  // Stall indicator
  if(bike.stalled){
    if(Math.floor(Date.now()/200)%2===0){
      X.fillStyle='#ff2244';X.font='bold 13px Orbitron,sans-serif';
      X.textAlign='center';
      X.fillText('OVERHEATED!',LW/2,LH/2-10);
      X.fillText('COOLING DOWN...',LW/2,LH/2+8);
      X.textAlign='left';
    }
  }
}

function draw(){
  X.clearRect(0,0,C.width,C.height);
  X.save();X.scale(SC,SC);

  drawTrack();

  // Draw obstacles behind bike
  for(let o of obstacles){ if(o.x>PLAYER_X+30) drawObstacle(o); }

  // Draw bike
  const gy=GROUND_Y+groundOffset;
  const bikeY=gy+bike.airY-2;
  drawBike(PLAYER_X,bikeY,bike.lean,bike.wheelie,bike.speed);

  // Draw obstacles in front of bike
  for(let o of obstacles){ if(o.x<=PLAYER_X+30) drawObstacle(o); }

  drawHUD();

  // Phase overlays
  if(phase==='over'){
    X.fillStyle='rgba(0,0,0,0.75)';X.fillRect(0,0,LW,LH);
    X.fillStyle='#ff2244';X.font='bold 22px Orbitron,sans-serif';
    X.textAlign='center';
    X.fillText('RACE OVER',LW/2,LH/2-25);
    X.fillStyle='#ffd700';X.font='bold 13px Orbitron,sans-serif';
    X.fillText(Math.floor(score)+'m HASHED',LW/2,LH/2+5);
    X.fillStyle='#888';X.font='10px Orbitron,sans-serif';
    X.fillText('Score submitted!',LW/2,LH/2+25);
    X.textAlign='left';
  }
  if(phase==='ready'){
    X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(0,0,LW,LH);
    X.fillStyle='#ff2244';X.font='bold 22px Orbitron,sans-serif';
    X.textAlign='center';
    X.fillText('HASH RACER',LW/2,LH/2-45);
    X.fillStyle='#00f0ff';X.font='10px Orbitron,sans-serif';
    X.fillText('Hold THROTTLE to ride, TURBO for speed boost',LW/2,LH/2-15);
    X.fillText('Turbo fills HASH TEMP — overheat = stall!',LW/2,LH/2+3);
    X.fillText('Hit ramps to launch into the air!',LW/2,LH/2+21);
    X.textAlign='left';
  }

  X.restore();
}

function gameOver(){
  gameRunning=false; phase='over';
  arcadeSubmitScore('racer',Math.floor(score));
  draw();
}

function startGame(){
  score=0; frameCount=0; phase='play'; gameRunning=true;
  bike={trackY:0,airY:0,airVY:0,speed:0,heat:0,stalled:false,stallTimer:0,lean:0,wheelie:0};
  obstacles=[]; obsTimer=0; roadScroll=0;
  bgOffset1=0; bgOffset2=0; groundOffset=0; groundOffsetTarget=0; rampAngle=0;
  trackSegs=[];
  for(let i=0;i<8;i++) trackSegs.push(i<3?{type:SEG_FLAT,len:SEG_LEN,progress:0}:genSeg());
  if(animId) cancelAnimationFrame(animId);
  loop();
}

// Race timer (3 min race)
let raceEnd=0;
function loop(){
  update();
  // End race after score milestone or timer
  if(gameRunning&&phase==='play'){
    if(!raceEnd) raceEnd=Date.now()+3*60*1000;
    if(Date.now()>raceEnd){ gameOver(); return; }
  }
  draw();
  if(gameRunning) animId=requestAnimationFrame(loop);
}

document.addEventListener('keydown',e=>{
  if(e.code==='ArrowUp'||e.code==='KeyW') keys.throttle=true;
  if(e.code==='ShiftLeft'||e.code==='ShiftRight'||e.code==='KeyZ') keys.turbo=true;
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left=true;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.right=true;
});
document.addEventListener('keyup',e=>{
  if(e.code==='ArrowUp'||e.code==='KeyW') keys.throttle=false;
  if(e.code==='ShiftLeft'||e.code==='ShiftRight'||e.code==='KeyZ') keys.turbo=false;
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left=false;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.right=false;
});

document.addEventListener('DOMContentLoaded',()=>{
  phase='ready';
  requestAnimationFrame(()=>{ resize(); draw(); });
  showGameLobby('racer',()=>{ raceEnd=0; startGame(); });
});
</script>
</body>
</html>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 560, H = 380;
canvas.width = W; canvas.height = H;

// ─── State ────────────────────────────────────────────────────────────────
let state       = 'idle';  // idle | hunting | dogShow | duckFalling | nextDelay | roundEnd
let score       = 0;
let round       = 1;
let turnShots   = 3;
let duckQueue   = [];
let currentDuck = null;
let effects     = [];
let crossX = W / 2, crossY = H / 2;
let waitTimer   = 0;
let dogTimer    = 0;
let animId      = null;
let gameRunning = false;

const ROUNDS_MAX = 10;

// ─── Round Config ─────────────────────────────────────────────────────────
function roundCfg(r) {
  return {
    ducksPerRound: Math.min(2 + Math.floor(r / 2), 8),
    speed:         1.2 + r * 0.20,
    shotsPerDuck:  3,
  };
}

// ─── Duck Class ───────────────────────────────────────────────────────────
const DUCK_PALETTES = [
  { body: '#8B6914', head: '#166534', wing: '#6B5010', belly: '#d4a017' },
  { body: '#b45309', head: '#1e40af', wing: '#92400e', belly: '#fde68a' },
  { body: '#7c3aed', head: '#be185d', wing: '#5b21b6', belly: '#ddd6fe' },
];

class Duck {
  constructor(r) {
    const cfg  = roundCfg(r);
    this.dir   = Math.random() < 0.5 ? 1 : -1;
    this.x     = this.dir > 0 ? -70 : W + 70;
    this.baseY = 55 + Math.random() * (H - 200);
    this.y     = this.baseY;
    this.speed = cfg.speed * (0.85 + Math.random() * 0.3);
    this.t     = 0;
    this.wingUp    = true;
    this.wingTimer = 0;
    this.hit       = false;
    this.escaped   = false;
    this.alive     = true;
    this.fallSpeed = 0;
    this.pal       = DUCK_PALETTES[Math.floor(Math.random() * DUCK_PALETTES.length)];
    // Occasionally add a diagonal up/down trajectory
    this.dy = (Math.random() - 0.5) * 0.5;
  }

  update() {
    if (this.hit) {
      this.fallSpeed += 0.55;
      this.y += this.fallSpeed;
      this.x += this.speed * this.dir * 0.3;
      if (this.y > H + 40) this.alive = false;
      return;
    }
    this.t++;
    this.x     += this.speed * this.dir;
    this.baseY += this.dy;
    this.y      = this.baseY + Math.sin(this.t * 0.08) * 22;
    this.wingTimer++;
    if (this.wingTimer > 7) { this.wingUp = !this.wingUp; this.wingTimer = 0; }
    if (this.dir > 0 && this.x > W + 80) { this.escaped = true; this.alive = false; }
    if (this.dir < 0 && this.x < -80)    { this.escaped = true; this.alive = false; }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    if (this.dir < 0) ctx.scale(-1, 1);
    const p = this.pal;

    // Shadow wing (back)
    ctx.fillStyle = p.wing;
    ctx.beginPath();
    ctx.ellipse(2, this.wingUp ? -13 : 3, 16, 6, this.wingUp ? -0.5 : 0.4, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.fillStyle = p.body;
    ctx.beginPath(); ctx.ellipse(0, 0, 20, 12, 0, 0, Math.PI * 2); ctx.fill();

    // Belly
    ctx.fillStyle = p.belly;
    ctx.beginPath(); ctx.ellipse(4, 3, 10, 7, 0, 0, Math.PI * 2); ctx.fill();

    // Tail feathers
    ctx.fillStyle = p.wing;
    ctx.beginPath();
    ctx.moveTo(-16, -3); ctx.lineTo(-26, -9); ctx.lineTo(-20, 2);
    ctx.moveTo(-16, -1); ctx.lineTo(-24, 5);  ctx.lineTo(-14, 6);
    ctx.fill();

    // Neck
    ctx.fillStyle = p.body;
    ctx.beginPath(); ctx.ellipse(15, -6, 8, 6, 0.3, 0, Math.PI * 2); ctx.fill();

    // Head
    ctx.fillStyle = p.head;
    ctx.beginPath(); ctx.arc(18, -11, 9, 0, Math.PI * 2); ctx.fill();

    // Bill (top jaw)
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath();
    ctx.moveTo(25, -13); ctx.lineTo(35, -10); ctx.lineTo(25, -8);
    ctx.closePath(); ctx.fill();
    // Bill (bottom jaw) — slightly open
    ctx.fillStyle = '#d97706';
    ctx.beginPath();
    ctx.moveTo(25, -8); ctx.lineTo(33, -8); ctx.lineTo(25, -6);
    ctx.closePath(); ctx.fill();

    // Eye white
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(21, -13, 3, 0, Math.PI * 2); ctx.fill();
    // Eye pupil
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(22, -13, 1.8, 0, Math.PI * 2); ctx.fill();
    // Eye shine
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(22.6, -13.6, 0.7, 0, Math.PI * 2); ctx.fill();

    if (this.hit) {
      // X eyes
      ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(18,-17); ctx.lineTo(24,-11);
      ctx.moveTo(24,-17); ctx.lineTo(18,-11);
      ctx.stroke();
    }

    ctx.restore();
  }

  hitTest(mx, my) {
    const dx = mx - this.x, dy = my - this.y;
    return Math.sqrt(dx * dx + dy * dy) < 30;
  }
}

// ─── Dog ──────────────────────────────────────────────────────────────────
function drawDog(dogT) {
  const cx  = W / 2;
  const RISE_DUR = 55, LAUGH_DUR = 130, LOWER_DUR = 55;
  let progress, phase;
  if (dogT < RISE_DUR) {
    phase = 'rising'; progress = dogT / RISE_DUR;
  } else if (dogT < RISE_DUR + LAUGH_DUR) {
    phase = 'laughing'; progress = (dogT - RISE_DUR) / LAUGH_DUR;
  } else {
    phase = 'lowering'; progress = (dogT - RISE_DUR - LAUGH_DUR) / LOWER_DUR;
  }

  const fromY = H + 10;
  const toY   = H - 30;
  let dogTop;
  if (phase === 'rising')   dogTop = fromY - (fromY - toY) * easeOut(progress);
  else if (phase === 'laughing') dogTop = toY;
  else                      dogTop = toY + (fromY - toY) * easeOut(progress);

  // Clip to grass area so dog rises from grass
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, H - 62, W, 62 + 200);
  ctx.clip();

  const bx = cx - 20, by = dogTop;

  // Body
  ctx.fillStyle = '#c9a96e';
  ctx.beginPath(); ctx.ellipse(bx, by - 20, 32, 25, 0, 0, Math.PI * 2); ctx.fill();

  // Head
  ctx.fillStyle = '#c9a96e';
  ctx.beginPath(); ctx.arc(bx + 15, by - 55, 22, 0, Math.PI * 2); ctx.fill();

  // Brown patch on head
  ctx.fillStyle = '#8B5C2A';
  ctx.beginPath(); ctx.ellipse(bx + 20, by - 62, 10, 7, 0.4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(bx + 8,  by - 64, 8, 6, -0.3, 0, Math.PI * 2); ctx.fill();

  // Ears (floppy)
  ctx.fillStyle = '#a97c50';
  ctx.beginPath();
  ctx.ellipse(bx - 5, by - 58, 9, 18, -0.25, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath();
  ctx.ellipse(bx + 36, by - 53, 9, 18, 0.25, 0, Math.PI * 2); ctx.fill();

  // Nose
  ctx.fillStyle = '#2d1f0e';
  ctx.beginPath(); ctx.ellipse(bx + 33, by - 55, 6, 4, 0, 0, Math.PI * 2); ctx.fill();
  // Nostrils
  ctx.fillStyle = '#1a0f07';
  ctx.beginPath(); ctx.ellipse(bx + 31, by - 56, 2, 1.5, -0.4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(bx + 35, by - 55, 2, 1.5, 0.4, 0, Math.PI * 2); ctx.fill();

  // Eyes
  if (phase === 'laughing') {
    // Squinted laugh eyes
    ctx.strokeStyle = '#2d1f0e'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(bx + 8,  by - 60, 5, 0.3, Math.PI - 0.3); ctx.stroke();
    ctx.beginPath(); ctx.arc(bx + 24, by - 60, 5, 0.3, Math.PI - 0.3); ctx.stroke();
  } else {
    ctx.fillStyle = '#2d1f0e';
    ctx.beginPath(); ctx.arc(bx + 8,  by - 60, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(bx + 24, by - 60, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(bx + 9.5, by - 61.5, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(bx + 25.5,by - 61.5, 1.5, 0, Math.PI * 2); ctx.fill();
  }

  // Mouth
  ctx.strokeStyle = '#2d1f0e'; ctx.lineWidth = 2;
  if (phase === 'laughing') {
    // Big grin
    ctx.beginPath();
    ctx.moveTo(bx + 8, by - 47);
    ctx.quadraticCurveTo(bx + 20, by - 38, bx + 33, by - 47);
    ctx.stroke();
    // Tongue
    ctx.fillStyle = '#f87171';
    ctx.beginPath(); ctx.ellipse(bx + 20, by - 42, 8, 5, 0, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.beginPath();
    ctx.moveTo(bx + 12, by - 47);
    ctx.quadraticCurveTo(bx + 20, by - 43, bx + 28, by - 47);
    ctx.stroke();
  }

  // Duck held up (laughing only)
  if (phase === 'laughing') {
    ctx.save();
    ctx.translate(bx - 50, by - 40);
    ctx.scale(0.7, 0.7);
    const p = DUCK_PALETTES[0];
    ctx.fillStyle = p.body;
    ctx.beginPath(); ctx.ellipse(0, 0, 20, 12, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = p.head;
    ctx.beginPath(); ctx.arc(16, -10, 9, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath(); ctx.moveTo(23,-12); ctx.lineTo(31,-9); ctx.lineTo(23,-7); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // HA HA text
  if (phase === 'laughing') {
    const bob = Math.sin(dogT * 0.2) * 3;
    ctx.font = 'bold 18px "Orbitron", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fde047';
    ctx.shadowColor = '#ca8a04'; ctx.shadowBlur = 8;
    ctx.fillText('HA  HA!', cx, by - 85 + bob);
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

function easeOut(t) { return 1 - Math.pow(1 - t, 2); }

// ─── Background ────────────────────────────────────────────────────────────
const clouds = [
  { x: 70,  y: 38, r: 48 },
  { x: 240, y: 22, r: 36 },
  { x: 400, y: 50, r: 44 },
  { x: 500, y: 18, r: 30 },
];

function drawBg() {
  const sky = ctx.createLinearGradient(0, 0, 0, H - 62);
  sky.addColorStop(0,   '#1e3a8a');
  sky.addColorStop(0.6, '#3b82f6');
  sky.addColorStop(1,   '#93c5fd');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H - 62);

  clouds.forEach(cl => drawCloud(cl.x, cl.y, cl.r));

  // Ground
  ctx.fillStyle = '#15803d';
  ctx.fillRect(0, H - 62, W, 62);
  ctx.fillStyle = '#16a34a';
  ctx.fillRect(0, H - 62, W, 14);

  // Grass blades
  ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 1.5;
  for (let i = 0; i < W; i += 10) {
    const h = 6 + Math.sin(i * 0.37) * 4;
    ctx.beginPath();
    ctx.moveTo(i, H - 62);
    ctx.quadraticCurveTo(i + 3, H - 62 - h, i + 2, H - 62 - h - 3);
    ctx.stroke();
  }

  // Trees
  [[28,H-62],[92,H-72],[W-42,H-62],[W-110,H-78],[W/2-180,H-68]].forEach(([tx,ty]) => drawTree(tx, ty));
}

function drawCloud(x, y, r) {
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  [[0,0,r*0.55],[r*0.48,6,r*0.48],[r*0.96,2,r*0.4],[-r*0.46,8,r*0.38]].forEach(([ox,oy,cr]) => {
    ctx.beginPath(); ctx.arc(x+ox, y+oy, cr, 0, Math.PI*2); ctx.fill();
  });
}

function drawTree(x, y) {
  ctx.fillStyle = '#4a2608';
  ctx.fillRect(x - 5, y - 8, 10, 14);
  ctx.fillStyle = '#14532d';
  [[0,-55,22],[0,-78,16],[0,-96,11]].forEach(([ox,oy,hw]) => {
    ctx.beginPath();
    ctx.moveTo(x+ox, y+oy); ctx.lineTo(x-hw, y); ctx.lineTo(x+hw, y);
    ctx.closePath(); ctx.fill();
    y += oy < -78 ? 0 : 0; // noop; keep ref
  });
}

// ─── Effects ───────────────────────────────────────────────────────────────
function spawnEffect(x, y, hit) {
  const cnt = hit ? 10 : 6;
  for (let i = 0; i < cnt; i++) {
    const a  = Math.random() * Math.PI * 2;
    const sp = 2 + Math.random() * 5;
    effects.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp - (hit ? 3 : 1),
      life: hit ? 35 : 28,
      maxLife: hit ? 35 : 28,
      col: hit ? (Math.random() < 0.5 ? '#fbbf24' : '#a3e635') : '#ff6b6b',
      type: hit ? 'feather' : 'puff',
    });
  }
  if (!hit) {
    effects.push({ x, y: y - 10, vx: 0, vy: -0.8, life: 40, maxLife: 40, col: '#ff4444', type: 'text', txt: 'MISS!' });
  }
}

function updateEffects() {
  effects = effects.filter(e => e.life > 0);
  effects.forEach(e => {
    e.x  += e.vx;
    e.y  += e.vy;
    if (e.type === 'feather') { e.vy += 0.18; e.vx *= 0.97; }
    e.life--;
    const a = e.life / e.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle   = e.col;
    if (e.type === 'feather') {
      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.rotate(Math.atan2(e.vy, e.vx));
      ctx.beginPath(); ctx.ellipse(0, 0, 5, 2, 0, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    } else if (e.type === 'puff') {
      ctx.beginPath(); ctx.arc(e.x, e.y, 4 * a + 2, 0, Math.PI * 2); ctx.fill();
    } else if (e.type === 'text') {
      ctx.globalAlpha = a;
      ctx.font = 'bold 14px "Orbitron", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(e.txt, e.x, e.y);
    }
  });
  ctx.globalAlpha = 1;
}

// ─── Crosshair ─────────────────────────────────────────────────────────────
function drawCrosshair(x, y) {
  ctx.save();
  ctx.strokeStyle = '#dc2626';
  ctx.lineWidth   = 2;
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur  = 8;
  const R = 18, G = 6;
  ctx.beginPath();
  ctx.arc(x, y, R, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x - R - G, y); ctx.lineTo(x - R + 8, y);
  ctx.moveTo(x + R - 8,  y); ctx.lineTo(x + R + G, y);
  ctx.moveTo(x, y - R - G); ctx.lineTo(x, y - R + 8);
  ctx.moveTo(x, y + R - 8);  ctx.lineTo(x, y + R + G);
  ctx.stroke();
  ctx.restore();
}

// ─── Shot indicator dots ────────────────────────────────────────────────────
function drawShotDots() {
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.arc(14 + i * 22, H - 18, 8, 0, Math.PI * 2);
    ctx.fillStyle = i < turnShots ? '#dc2626' : '#1f2937';
    ctx.fill();
    ctx.strokeStyle = '#374151'; ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

// ─── Score row (bottom right) ───────────────────────────────────────────────
function drawScoreRow() {
  ctx.fillStyle   = 'rgba(0,0,0,0.45)';
  ctx.beginPath();
  ctx.roundRect(W - 130, H - 32, 122, 24, 6);
  ctx.fill();
  ctx.fillStyle   = '#fde68a';
  ctx.font        = '700 11px "Orbitron", sans-serif';
  ctx.textAlign   = 'right';
  ctx.fillText(`RND ${round}  |  ${score.toLocaleString()}`, W - 10, H - 14);
}

// ─── Game Loop ─────────────────────────────────────────────────────────────
function loop() {
  animId = requestAnimationFrame(loop);
  ctx.clearRect(0, 0, W, H);
  drawBg();

  // ── hunting ──
  if (state === 'hunting' && currentDuck) {
    currentDuck.update();
    if ((currentDuck.escaped) && state === 'hunting') {
      state = 'dogShow';
      dogTimer = 0;
    }
    currentDuck.draw();
  }

  // ── duck falling after being shot ──
  if (state === 'duckFalling' && currentDuck) {
    currentDuck.update();
    currentDuck.draw();
    if (!currentDuck.alive) {
      state = 'nextDelay';
      waitTimer = 50;
    }
  }

  // ── dog show ──
  if (state === 'dogShow') {
    dogTimer++;
    drawDog(dogTimer);
    const total = 55 + 130 + 55;
    if (dogTimer >= total) {
      state     = 'nextDelay';
      waitTimer = 30;
    }
  }

  // ── next duck delay ──
  if (state === 'nextDelay') {
    waitTimer--;
    if (waitTimer <= 0) nextDuck();
  }

  // ── round end brief pause ──
  if (state === 'roundEnd') {
    waitTimer--;
    if (waitTimer <= 0) beginRound(round);
  }

  updateEffects();
  if (gameRunning) {
    drawShotDots();
    drawScoreRow();
  }
  drawCrosshair(crossX, crossY);
}

// ─── Game flow ─────────────────────────────────────────────────────────────
function beginRound(r) {
  const cfg = roundCfg(r);
  duckQueue = [];
  for (let i = 0; i < cfg.ducksPerRound; i++) duckQueue.push(new Duck(r));
  nextDuck();
}

function nextDuck() {
  if (duckQueue.length === 0) {
    // Round clear
    if (round >= ROUNDS_MAX) { finishGame(); return; }
    round++;
    document.getElementById('round-hud').textContent = round;
    state     = 'roundEnd';
    waitTimer = 80;
    return;
  }
  currentDuck = duckQueue.shift();
  turnShots   = roundCfg(round).shotsPerDuck;
  state       = 'hunting';
  updateHUD();
}

function fire(mx, my) {
  if (!gameRunning || state !== 'hunting' || !currentDuck || turnShots <= 0) return;
  turnShots--;
  updateHUD();

  if (currentDuck.hitTest(mx, my)) {
    currentDuck.hit = true;
    score += 100 * round;
    document.getElementById('score').textContent = score;
    spawnEffect(currentDuck.x, currentDuck.y, true);
    state = 'duckFalling';
  } else {
    spawnEffect(mx, my, false);
    if (turnShots === 0) {
      // No shots left and duck not hit
      state    = 'dogShow';
      dogTimer = 0;
    }
  }
}

function finishGame() {
  gameRunning = false;
  state       = 'idle';
  arcadeSubmitScore('duckhunt', score);
}

function startGame() {
  score  = 0;
  round  = 1;
  effects = [];
  document.getElementById('score').textContent    = 0;
  document.getElementById('round-hud').textContent = 1;
  gameRunning = true;
  if (!animId) loop();
  beginRound(1);
}

function updateHUD() {
  document.getElementById('shots-hud').textContent = turnShots;
}

// ─── Input ─────────────────────────────────────────────────────────────────
const CROSS_SPEED = 7; // px per frame when D-pad/arrow held
let _dpadDx = 0, _dpadDy = 0, _dpadRaf = null;

function getCanvasPos(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (clientX - r.left) * (W / r.width),
    y: (clientY - r.top)  * (H / r.height),
  };
}

function _clampCross() {
  crossX = Math.max(0, Math.min(W, crossX));
  crossY = Math.max(0, Math.min(H - 65, crossY));
}

// D-pad continuous movement
function dpadStart(dx, dy, ev) {
  if (ev) ev.preventDefault();
  _dpadDx = dx; _dpadDy = dy;
  if (_dpadRaf) return;
  function tick() {
    if (!_dpadDx && !_dpadDy) { _dpadRaf = null; return; }
    crossX += _dpadDx * CROSS_SPEED;
    crossY += _dpadDy * CROSS_SPEED;
    _clampCross();
    _dpadRaf = requestAnimationFrame(tick);
  }
  _dpadRaf = requestAnimationFrame(tick);
}
function dpadStop(ev) {
  if (ev) ev.preventDefault();
  _dpadDx = 0; _dpadDy = 0;
}

// Mouse: move crosshair
canvas.addEventListener('mousemove', e => {
  const p = getCanvasPos(e.clientX, e.clientY);
  crossX = p.x; crossY = p.y;
  _clampCross();
});

// Mouse click: fire at cursor position
canvas.addEventListener('click', e => {
  const p = getCanvasPos(e.clientX, e.clientY);
  crossX = p.x; crossY = p.y;
  fire(p.x, p.y);
});

// Touch on canvas: snap crosshair to tap position then fire on release
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const p = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY);
  crossX = p.x; crossY = p.y;
  _clampCross();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const p = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY);
  crossX = p.x; crossY = p.y;
  _clampCross();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  fire(crossX, crossY);
}, { passive: false });

// Arrow keys move crosshair; Space fires
const _keysHeld = {};
window.addEventListener('keydown', e => {
  if (_keysHeld[e.code]) return;
  _keysHeld[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (!gameRunning) showGameLobby('duckhunt', () => startGame());
    else fire(crossX, crossY);
  }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) {
    e.preventDefault();
    const dirs = { ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0] };
    const [dx, dy] = dirs[e.code];
    dpadStart(dx, dy);
  }
});
window.addEventListener('keyup', e => {
  delete _keysHeld[e.code];
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) dpadStop();
});

function ctrlFire(ev) { if (ev) ev.preventDefault(); fire(crossX, crossY); }

function ctrlStart(ev) {
  if (ev) ev.preventDefault();
  if (!gameRunning) showGameLobby('duckhunt', () => startGame());
}

// start render loop immediately (shows background + crosshair before game)
loop();
</script>
</body>
</html>

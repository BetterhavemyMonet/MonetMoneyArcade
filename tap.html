<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tap Frenzy — Crypto Tap Game | Monet Money Arcade</title>
<meta name="description" content="Play Tap Frenzy on Solana — tap as fast as you can for 20 seconds and get graded S to C. Win MONET token prizes. $0.99 entry, pay with crypto or card.">
<meta name="keywords" content="tap game crypto, fast tap Solana game, MONET tap game, Web3 tapping game, blockchain speed game, earn crypto tapping">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://betterhavemymonet.com/tap.html">
<meta property="og:title" content="Tap Frenzy — Crypto Speed Tap Game on Solana">
<meta property="og:description" content="Tap as fast as possible in 20 seconds. Get graded S to C. Win MONET crypto prizes.">
<meta property="og:image" content="https://betterhavemymonet.com/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<script src="https://unpkg.com/@solana/web3.js@1.98.0/lib/index.iife.min.js"></script>
<script src="/wallet.js"></script>
<style>
* { box-sizing: border-box; }
body.game-page { background: #000; overflow: hidden; touch-action: none; }
body.game-page::before { display: none; }
#wbar { text-align: center; padding: 3px 12px; background: rgba(0,0,0,0.7); font-size: 11px; }
.gw { display: flex; flex-direction: column; height: calc(100vh - 28px); position: relative; align-items: center; }
#gc { display: block; width: 100%; flex: 1; min-height: 0; }
.hud-bar { display: flex; justify-content: space-around; align-items: center; padding: 6px 14px; background: rgba(0,0,0,0.85); border-top: 1px solid #301000; flex-shrink: 0; width: 100%; }
.hud-val { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 900; line-height: 1; }
.hud-lbl { font-family: 'Orbitron', sans-serif; font-size: 8px; color: #555; letter-spacing: 1px; margin-bottom: 2px; }
#taps-v  { color: #ff6600; }
#timer-v { color: #ffd700; }
#tps-v   { color: #00ff9d; }
</style>
</head>
<body class="game-page">
<div class="wallet-bar" id="wbar"></div>
<div class="gw">
  <canvas id="gc"></canvas>
  <div class="hud-bar">
    <div style="text-align:center"><div class="hud-lbl">TAPS</div><div class="hud-val" id="taps-v">0</div></div>
    <div style="text-align:center"><a href="arcade.html" style="font-size:20px;color:#333;text-decoration:none">⌂</a></div>
    <div style="text-align:center"><div class="hud-lbl">TIME</div><div class="hud-val" id="timer-v">20</div></div>
    <div style="text-align:center"><div class="hud-lbl">TPS</div><div class="hud-val" id="tps-v">0.0</div></div>
  </div>
</div>
<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.clientWidth; H = canvas.clientHeight;
  canvas.width = W; canvas.height = H;
}
window.addEventListener('resize', resize);
resize();

const GAME_SECS = 20;
const BTN_R  = 72;   // tap button radius
const MAX_R  = 90;   // max ripple size

let taps, timeLeft, phase, rafId, timerInterval, sessionActive = false;
let ripples = [], floats = [], shakes = [];
let btnScale = 1, btnTarget = 1;
let tapsPerSec = [];  // last-second tap timestamps

function init() {
  taps = 0; timeLeft = GAME_SECS; phase = 'play';
  ripples = []; floats = []; tapsPerSec = [];
  btnScale = 1; btnTarget = 1;
  resize();
  updateHUD();
  startTimer();
  rafId = requestAnimationFrame(loop);
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (phase !== 'play') { clearInterval(timerInterval); return; }
    timeLeft--;
    if (timeLeft <= 5) document.getElementById('timer-v').style.color = '#ff2200';
    if (timeLeft <= 0) { clearInterval(timerInterval); endGame(); return; }
    updateHUD();
  }, 1000);
}

function updateHUD() {
  document.getElementById('taps-v').textContent = taps;
  document.getElementById('timer-v').textContent = timeLeft;
  const now = Date.now();
  tapsPerSec = tapsPerSec.filter(t => now - t < 1000);
  document.getElementById('tps-v').textContent = tapsPerSec.length.toFixed(0);
}

function doTap(clientX, clientY) {
  if (phase !== 'play') return;
  const rect = canvas.getBoundingClientRect();
  const mx = (clientX - rect.left) * (W / rect.width);
  const my = (clientY - rect.top)  * (H / rect.height);
  const cx = W / 2, cy = H / 2;
  const dx = mx - cx, dy = my - cy;
  const inButton = dx*dx + dy*dy < BTN_R * BTN_R * 1.6;

  taps++;
  tapsPerSec.push(Date.now());
  btnScale = 0.88; btnTarget = 1.04;

  // Ripple from tap point (or center if on button)
  const rx = inButton ? cx : mx, ry = inButton ? cy : my;
  ripples.push({ x: rx, y: ry, r: 8, maxR: inButton ? MAX_R : 50, life: 28, ml: 28, color: inButton ? '#ff6600' : '#ff880066' });

  // Floating +1
  floats.push({ x: mx, y: my, life: 30, ml: 30, vy: -1.6 });

  updateHUD();
}

canvas.addEventListener('click', e => doTap(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => doTap(t.clientX, t.clientY));
}, {passive:false});

document.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); doTap(W/2, H/2); } });

function loop() {
  if (phase !== 'play') return;
  ctx.clearRect(0,0,W,H);

  // BG
  const intensity = Math.min(1, tapsPerSec.length / 12);
  const bgColor = `rgb(${Math.round(10 + intensity*20)},${Math.round(2)},${Math.round(0)})`;
  ctx.fillStyle = bgColor; ctx.fillRect(0,0,W,H);

  // Grid dots
  ctx.fillStyle = '#ff660012';
  for (let x = 0; x < W; x += 40) for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI*2); ctx.fill();
  }

  // Ripples
  ripples = ripples.filter(r => r.life > 0);
  ripples.forEach(r => {
    r.r = r.maxR * (1 - r.life / r.ml);
    r.life--;
    ctx.save(); ctx.globalAlpha = (r.life / r.ml) * 0.5;
    ctx.strokeStyle = r.color; ctx.lineWidth = 2;
    ctx.shadowBlur = 8; ctx.shadowColor = r.color;
    ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  });

  // Tap button
  const cx = W/2, cy = H/2;
  btnScale += (btnTarget - btnScale) * 0.25;
  if (Math.abs(btnScale - btnTarget) < 0.005) btnTarget = 1;

  ctx.save();
  ctx.translate(cx, cy); ctx.scale(btnScale, btnScale);

  // Outer glow rings (intensity-based)
  for (let i = 2; i >= 0; i--) {
    const ringR = BTN_R + 14 + i * 18;
    ctx.save(); ctx.globalAlpha = intensity * (0.15 - i * 0.04);
    ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 3;
    ctx.shadowBlur = 20; ctx.shadowColor = '#ff6600';
    ctx.beginPath(); ctx.arc(0, 0, ringR, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // Button fill
  const g = ctx.createRadialGradient(-BTN_R*0.3, -BTN_R*0.3, 4, 0, 0, BTN_R);
  const heat = Math.min(1, tapsPerSec.length / 10);
  const r1 = Math.round(180 + heat * 75), r2 = Math.round(80 + heat * 80);
  g.addColorStop(0, `rgb(${r1},${Math.round(r1*0.5)},0)`);
  g.addColorStop(0.5, `rgb(${r2},${Math.round(r2*0.4)},0)`);
  g.addColorStop(1, '#1a0600');
  ctx.fillStyle = g;
  ctx.shadowBlur = 24 + heat * 20; ctx.shadowColor = '#ff6600';
  ctx.beginPath(); ctx.arc(0,0,BTN_R,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Border
  ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(0,0,BTN_R,0,Math.PI*2); ctx.stroke();

  // Label
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px Orbitron, sans-serif'; ctx.textAlign = 'center';
  ctx.shadowBlur = 10; ctx.shadowColor = '#ff660088';
  ctx.fillText('TAP!', 0, 8);
  ctx.shadowBlur = 0;

  ctx.restore();

  // Floating +1 texts
  floats = floats.filter(f => f.life > 0);
  floats.forEach(f => {
    f.y += f.vy; f.life--;
    ctx.save(); ctx.globalAlpha = f.life / f.ml;
    ctx.fillStyle = '#ffd700'; ctx.font = 'bold 14px Orbitron, sans-serif';
    ctx.textAlign = 'center'; ctx.shadowBlur = 6; ctx.shadowColor = '#ffd700';
    ctx.fillText('+1', f.x, f.y); ctx.restore();
  });

  // Timer arc around button
  if (timeLeft <= 10) {
    const pct = timeLeft / 10;
    ctx.save(); ctx.strokeStyle = '#ff2200'; ctx.lineWidth = 4; ctx.globalAlpha = 0.6;
    ctx.beginPath(); ctx.arc(cx, cy, BTN_R + 8, -Math.PI/2, -Math.PI/2 + Math.PI*2*pct);
    ctx.stroke(); ctx.restore();
  }

  rafId = requestAnimationFrame(loop);
}

function endGame() {
  phase = 'over';
  cancelAnimationFrame(rafId);
  const score = taps;

  if (sessionActive) {
    arcadeSubmitScore('tap', score).catch(() => {});
    sessionActive = false;
  }

  const tpsAvg = (taps / GAME_SECS).toFixed(1);
  let grade = taps < 40 ? 'C' : taps < 70 ? 'B' : taps < 100 ? 'A' : taps < 130 ? 'S' : 'S+';

  const box = document.createElement('div');
  box.style.cssText = 'position:fixed;inset:0;background:rgba(8,2,0,0.96);z-index:9999;display:flex;align-items:center;justify-content:center;font-family:Orbitron,sans-serif';
  box.innerHTML = `
    <div style="background:linear-gradient(160deg,#120400,#1e0800);border:2px solid #ff6600;border-radius:20px;padding:28px 22px;width:min(320px,90vw);text-align:center">
      <div style="font-size:52px;font-weight:900;color:#ff6600;line-height:1;margin-bottom:4px">${grade}</div>
      <div style="font-size:9px;color:#666;letter-spacing:3px;margin-bottom:16px">PERFORMANCE GRADE</div>
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #ffffff10;font-size:12px">
        <span style="color:#888">TOTAL TAPS</span><span style="color:#ff6600;font-weight:800">${taps}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #ffffff10;font-size:12px">
        <span style="color:#888">TAPS / SEC</span><span style="color:#ffd700;font-weight:800">${tpsAvg}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:8px 0;font-size:12px">
        <span style="color:#888">SCORE</span><span style="color:#00ff9d;font-weight:800">${score.toLocaleString()}</span>
      </div>
      <button onclick="location.reload()" style="margin-top:16px;width:100%;padding:13px;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,#ff6600,#cc3300);color:#fff;font-family:Orbitron,sans-serif;font-size:12px;font-weight:900">PLAY AGAIN</button>
      <button onclick="location.href='arcade.html'" style="margin-top:8px;width:100%;padding:10px;border-radius:12px;border:1px solid #333;cursor:pointer;background:transparent;color:#666;font-family:Orbitron,sans-serif;font-size:10px">← ARCADE</button>
    </div>`;
  document.body.appendChild(box);
}

document.addEventListener('DOMContentLoaded', () => {
  renderWalletBar('wbar');
  phase = 'idle';

  function drawIdle() {
    if (phase !== 'idle') return;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = '#080200'; ctx.fillRect(0,0,W,H);
    const t = Date.now() / 1000;
    const pulse = 0.85 + 0.15 * Math.sin(t * 2.5);
    const cx = W/2, cy = H/2;
    ctx.save(); ctx.translate(cx, cy);
    const g = ctx.createRadialGradient(0,0,10,0,0,BTN_R);
    g.addColorStop(0, `rgba(255,100,0,${pulse * 0.8})`);
    g.addColorStop(0.6, `rgba(200,50,0,${pulse * 0.5})`);
    g.addColorStop(1, '#1a0600');
    ctx.fillStyle = g; ctx.shadowBlur = 30; ctx.shadowColor = '#ff6600';
    ctx.beginPath(); ctx.arc(0,0,BTN_R,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0,0,BTN_R,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur = 0; ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px Orbitron, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('TAP!', 0, 8);
    ctx.restore();
    ctx.fillStyle = '#ff6600'; ctx.font = 'bold 12px Orbitron, sans-serif';
    ctx.textAlign = 'center'; ctx.shadowBlur = 10; ctx.shadowColor = '#ff6600';
    ctx.fillText('TAP FRENZY', cx, cy - BTN_R - 22);
    ctx.shadowBlur = 0; ctx.fillStyle = '#ffffff44'; ctx.font = 'bold 9px Orbitron, sans-serif';
    ctx.fillText('tap as fast as possible · 20 seconds', cx, cy - BTN_R - 8);
    requestAnimationFrame(drawIdle);
  }
  drawIdle();

  showPayGate('tap', () => {
    sessionActive = true;
    phase = 'starting';
    init();
  }, { pot: 'Win 80% back', rake: '20%' });
});
</script>
</body>
</html>

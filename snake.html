<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Slithering Serpent</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
.game-title {
  background: linear-gradient(90deg, #00ff9d, #00f0ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.canvas-wrap canvas { border: 2px solid #00ff9d; box-shadow: 0 0 20px #00ff9d44; }
</style>
<script src="https://unpkg.com/@solana/web3.js@1.98.0/lib/index.iife.min.js"></script>
<script src="/wallet.js"></script>
<script src="/lobby.js"></script>
<script src="/gamepad.js"></script>
</head>
<body class="game-page">
<div class="game-wrap">
  <div class="game-header">
    <span class="game-title">SLITHERING SERPENT</span>
    <span class="game-hud">Score: <span id="score">0</span> &nbsp;|&nbsp; Best: <span id="best">0</span></span>
  </div>
  <div class="game-msg" id="msg">Press START or SPACE</div>
  <div class="canvas-wrap">
    <canvas id="c"></canvas>
  </div>
</div>

<div class="ctrl-area">
  <div class="ctrl-body">
    <div class="ctrl-dpad">
      <div class="ctrl-dpad-center"></div>
      <button class="dpad-up"    ontouchstart="ctrlDir(0,-1,event)" onmousedown="ctrlDir(0,-1)">&#9650;</button>
      <button class="dpad-down"  ontouchstart="ctrlDir(0,1,event)"  onmousedown="ctrlDir(0,1)">&#9660;</button>
      <button class="dpad-left"  ontouchstart="ctrlDir(-1,0,event)" onmousedown="ctrlDir(-1,0)">&#9664;</button>
      <button class="dpad-right" ontouchstart="ctrlDir(1,0,event)"  onmousedown="ctrlDir(1,0)">&#9654;</button>
    </div>
    <div class="ctrl-mid">
      <button class="ctrl-start" ontouchstart="ctrlStart(event)" onmousedown="ctrlStart()">START</button>
      <a class="ctrl-home" href="arcade.html">&#8962;</a>
    </div>
    <div class="ctrl-ab">
      <button class="ctrl-btn-a" ontouchstart="ctrlStart(event)" onmousedown="ctrlStart()">A</button>
      <button class="ctrl-btn-b" style="opacity:0.4;pointer-events:none">B</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const CELL = 20, COLS = 21, ROWS = 21;
const W = COLS * CELL, H = ROWS * CELL;
canvas.width = W; canvas.height = H;

const img = new Image(); img.src = '/dino-sprite.png';

let snake, dir, nextDir, food, score, gameRunning, intervalId;
let bestScore = parseInt(localStorage.getItem('snake_best')||'0');
document.getElementById('best').textContent = bestScore;

function snakeSpeed() { return Math.max(60, 120 - Math.floor(snake.length / 3) * 5); }

function startGame() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; gameRunning = true;
  document.getElementById('msg').textContent = '';
  document.getElementById('score').textContent = 0;
  placeFood();
  if (intervalId) clearInterval(intervalId);
  intervalId = setInterval(tick, snakeSpeed());
}

function placeFood() {
  let empty;
  do {
    empty = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)};
  } while (snake.some(s=>s.x===empty.x&&s.y===empty.y));
  food = empty;
}

function tick() {
  if (!gameRunning) return;
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    gameRunning = false; clearInterval(intervalId);
    document.getElementById('msg').textContent = 'GAME OVER — Score: ' + score;
    saveScore(score); arcadeSubmitScore('snake', score); draw(); return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) {
    score += 10;
    if (score > bestScore) {
      bestScore = score; localStorage.setItem('snake_best', bestScore);
      document.getElementById('best').textContent = bestScore;
    }
    document.getElementById('score').textContent = score;
    placeFood();
    // Speed up as snake grows
    clearInterval(intervalId);
    intervalId = setInterval(tick, snakeSpeed());
  } else { snake.pop(); }
  draw();
}

function draw() {
  ctx.fillStyle = '#02040a'; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#0a1428'; ctx.lineWidth = 0.5;
  for (let x=0;x<COLS;x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,H); ctx.stroke(); }
  for (let y=0;y<ROWS;y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(W,y*CELL); ctx.stroke(); }

  if (!snake) return;
  snake.forEach((s, i) => {
    if (i === 0) {
      if (img.complete && img.naturalWidth > 0) {
        ctx.drawImage(img, s.x*CELL, s.y*CELL, CELL, CELL);
      } else {
        ctx.fillStyle = '#00ff9d'; ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2);
      }
    } else {
      const t = 1 - i / snake.length;
      ctx.fillStyle = `rgba(0, ${Math.floor(180+75*t)}, ${Math.floor(100+57*t)}, 0.9)`;
      ctx.shadowColor = '#00ff9d'; ctx.shadowBlur = 4;
      ctx.beginPath(); ctx.roundRect(s.x*CELL+2, s.y*CELL+2, CELL-4, CELL-4, 3); ctx.fill();
      ctx.shadowBlur = 0;
    }
  });

  if (!food) return;
  ctx.fillStyle = '#ff4488'; ctx.shadowColor = '#ff4488'; ctx.shadowBlur = 12;
  ctx.beginPath(); ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ffff00'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('$', food.x*CELL+CELL/2, food.y*CELL+CELL/2+4); ctx.textAlign = 'left';
}

function setDir(x, y) {
  if (!gameRunning) { startGame(); return; }
  if (x !== 0 && dir.x !== 0) return;
  if (y !== 0 && dir.y !== 0) return;
  nextDir = {x, y};
}

function ctrlDir(x, y, e) { if (e) e.preventDefault(); setDir(x, y); }
function ctrlStart(e) { if (e) e.preventDefault(); startGame(); }

document.addEventListener('keydown', e => {
  if (window.isLobbyOpen && window.isLobbyOpen()) return;
  if (!gameRunning && (e.code==='Space'||e.code==='Enter')) { startGame(); return; }
  if (e.code==='ArrowUp'   ||e.key==='w') setDir(0,-1);
  if (e.code==='ArrowDown' ||e.key==='s') setDir(0,1);
  if (e.code==='ArrowLeft' ||e.key==='a') setDir(-1,0);
  if (e.code==='ArrowRight'||e.key==='d') setDir(1,0);
  e.preventDefault();
});

let touchSX, touchSY;
canvas.addEventListener('touchstart', e => {
  if (!gameRunning) { startGame(); return; }
  touchSX=e.touches[0].clientX; touchSY=e.touches[0].clientY; e.preventDefault();
}, {passive:false});
canvas.addEventListener('touchend', e => {
  const dx=e.changedTouches[0].clientX-touchSX, dy=e.changedTouches[0].clientY-touchSY;
  if (Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0); else setDir(0,dy>0?1:-1);
  e.preventDefault();
}, {passive:false});

function saveScore(s) {
  let lb = JSON.parse(localStorage.getItem('leaderboard')||'[]');
  lb.push({ name:localStorage.getItem('player_name')||'Player', game:'Snake', score:s, date:new Date().toLocaleDateString() });
  lb.sort((a,b)=>b.score-a.score);
  localStorage.setItem('leaderboard', JSON.stringify(lb.slice(0,20)));
}

// Static start screen
ctx.fillStyle = '#02040a'; ctx.fillRect(0, 0, W, H);
ctx.fillStyle = '#00ff9d'; ctx.font = '14px Orbitron'; ctx.textAlign = 'center';
ctx.fillText('Press START to play', W/2, H/2); ctx.textAlign = 'left';

// ─── Gamepad support ──────────────────────────────────────────────────────────
GamepadMgr.on('up',    () => setDir(0, -1));
GamepadMgr.on('down',  () => setDir(0, 1));
GamepadMgr.on('left',  () => setDir(-1, 0));
GamepadMgr.on('right', () => setDir(1, 0));
GamepadMgr.on('a',     () => { if (!gameRunning) startGame(); });
GamepadMgr.on('start', () => startGame());

// ─── Game Lobby ───────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const isCpu = new URLSearchParams(location.search).get('cpu');
  if (!isCpu) {
    showGameLobby('snake', () => startGame());
  }
});
</script>
</body>
</html>

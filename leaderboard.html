<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — Top Scores | Monet Money Arcade</title>
<meta name="description" content="See the top scores on Monet Money Arcade — the Web3 Solana arcade. View leaderboards for Mario, Pac-Man, Snake, Frogger, Space Invaders and all 16 games.">
<meta name="keywords" content="crypto arcade leaderboard, Solana game scores, MONET arcade top scores, Web3 game rankings, blockchain arcade high scores">

<link rel="canonical" href="https://betterhavemymonet.com/leaderboard.html">
<meta property="og:title" content="Leaderboard — Monet Money Arcade Top Scores">

<meta property="og:image" content="https://betterhavemymonet.com/logo.png">
<link rel="stylesheet" href="/styles.css">
</head>

<body>

<h2>🏆 LEADERBOARD</h2>

<ul id="board"></ul>

<script>
let board = JSON.parse(localStorage.getItem("leaderboard") || "[]");

// sort best scores (higher is better)
board.sort((a,b)=>b.score - a.score);

let list = document.getElementById("board");

board.slice(0,10).forEach((p,i)=>{
  let li = document.createElement("li");
  li.innerText = (i+1)+". "+p.name+" - "+p.score;
  list.appendChild(li);
});
</script>

</body>
</html>
